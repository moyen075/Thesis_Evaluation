paragraph: |
 Fake News on Social Media

 Today's world is highly dependent on Internet and electronic devices. Social media play a significant role in case of recreation and spending leisure time. But, social media 
 also develops a risk of spreading fake news on different topic which can alter the whole narrative of a story. It is very easy to spread fake news. Someone posts a picture, 
 screenshoot or writes a status and other people shares it without any verification. In this way, a rumour is spreaded. Sometimes, social media is used to build narrative or 
 manufactured consents against or in favour of something by spreading false news. For example, social media played an important pole in the Arab spring. After the July uprising 
 in Bangladesh. Indian media constantly spread fake news on torturing of minority community in Bangladesh. In fact, only small number of minority was attacked and that was due 
 to their involvement and connection to the massacre of students. Some Indian tweeter account constantly spread false news, sometimes AI generated photograph to manufactured 
 consent in their favour. A political group spread misinformation against their rival using social media to dehumanize them, to lower their reputation. This kind of fake news 
 create chaous in the society. The victims of fake news faces social problem. Fake news make the wrongdoer the victims and the victims wrongdoer and after the public perception. 
 people should be aware and should double check every content before posting or sharing. public awareness is the key to combat fake news and people should not spread such news.

