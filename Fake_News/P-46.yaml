paragraph: |
 Fake News on Social Media

 Fake news on social media refers to give the wrong information about any topic through social media to the mass people. In this modern world, most of the people are spending 
 their times on social media such as facebook, twitter, instagram and so on. In our everyday life, most of the time, what is happening in our country or the others important 
 news is known through these popular social media . But sometimes there are some group of people in our society, who are sharing these fake news through this media and most 
 often the mass people are not concern about the news authentication. They can easily trust the hews and as a result it creates a misunderstanding among the mass people. Most 
 often the fake news are published because of their personals benefits and facilities. Sometimes a group of people pays for publishing the fake news. It violates the digital 
 laws of a country. They must be take down upon under punishment so that others are not to get courage to do this heinous act again. Above all, we should bear in mind that public 
 awareness and government policies should be more strict to overcome this problem.

