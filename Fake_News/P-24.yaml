paragraph_id: "P-24"

paragraph: |
 "Fake news on Social Media"

 Fake news on Social Media working as a propaganda spreading machine are mostly spread by a selfish group of people resulting in irrational behaviour, or poor judgement and 
 social unrest inside a society. Most often a group of people tried to deviate the public attention from one matter to another then they start spreading fake news. and social 
 media being the most popular and unauthorized source of information, this selfish people use social media as a weapon to fire their fake news. It is rarely possible to fact 
 check the news from social media and due to people's poor judgement quality they consume the news. Sometimes fake news create agony against other community that is fueled by 
 the fake news. Thus we see communal violence that brings social unrest and affects the lives and livelihood of the common people. Two groups collide with each other and another 
 third selfish group takes the benefit out of it. Thus we can see the importance of fact checking while reading a news. Social media is mostly full of this fake news, we should 
 learn to filter out those news. To sum up, fake news are spread by a selfish group of people for their own selfish and heartless benefits, creating irrational behaviour in the 
 rational beings.

