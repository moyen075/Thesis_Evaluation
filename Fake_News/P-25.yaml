 feedback: |
  Score Breakdown:
  1. Content & Relevance: 2.0 / 3.0
      Reason: The student addresses the prompt adequately but the analysis is generic. It fails to define fake news within the specific context of social media mechanisms like algorithms or virality, and it lacks a specific real-world example.
  2. Organization & Cohesion: 1.0 / 2.0
      Reason: The paragraph is functional with a beginning, middle, and end, but the flow is clunky and the topic sentence focuses on morality rather than clearly introducing the core topic.
  3. Lexis & Academic Register: 1.5 / 2.5
      Reason: The vocabulary is standard and includes terms like "yellow journalism," but it relies on informal first-person pronouns ("we," "us") and lacks academic terminology such as "disinformation" or "echo chambers."
  4. Grammar & Mechanics: 0.5 / 2.5
      Reason: The text contains pervasive grammatical errors, including subject-verb agreement, uncountable noun usage, and pronoun-antecedent errors, which detract from the overall quality.
  
  Overall Score: 5.0 / 10
  
  Corrective Feedback:
  1. "In today era"
      Issue: Missing possessive marking or article.
      Correction: "In today's era" or "In the current era"
  2. "people spreads"
      Issue: Subject-verb agreement error with plural subject.
      Correction: "people spread"
  3. "false informations"
      Issue: "Information" is an uncountable noun and cannot be pluralized.
      Correction: "false information"
  4. "social sites lose its credibility"
      Issue: Pronoun-antecedent agreement error (plural "sites" requires plural "their").
      Correction: "social sites lose their credibility"
  
  Improvement Feedback:
  1. "In today era, we, the people all over the world, share every kind of information"
      Target Area: Lexis & Academic Register
      Suggestion: Remove first-person pronouns to maintain an objective, academic stance. Better alternative: "In the digital age, information is disseminated globally across various social media platforms."
  2. "These are commonly found reasons for spread of fake news on social media."
      Target Area: Content & Relevance
      Suggestion: To reach the 3.0 tier, integrate technical mechanisms and a concrete example. Better alternative: "These factors are often amplified by engagement-driven algorithms, as seen in the rapid spread of vaccine misinformation during the COVID-19 pandemic."

