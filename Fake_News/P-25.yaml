paragraph_id: "P-25"

paragraph: |
 Fake News on Social Media

 Lack of moral value sometimes causes fake news to spread in social media which in turn results in leading public opinion to a way which deviates from actual facts. In today 
 era, we, the people all over the world, share every kind of information through social media. While it keeps us informed about up-to-date news, sometimes people spreads 
 false news through it their own benefits. Some wants to come in lime-light, some want to cause trouble other party and some also want to create chaos in society. These are 
 commonly found reasons for spread of fake news on social media. Moreover, there are often exaggerated news to attract attention of readers which is named as yellow journalism. 
 These kind of incidents, spread false informations among general mass and cause mass-confusion. It also disrupts people's judgements about current political, economic and 
 other environment, causing them to take wrong steps. Sometimes, a group of people become victims of it and suffers loss of reputation and properties. Furthermore, social 
 sites lose its credibility and people do not easily believe any news causing slow-spread of mass awareness. In short, fake news on social media hampers our day to day life 
 causing lasting damage of our society and economic condition and with increasing our moral awareness we cannot get out of its harmful influences.

