paragraph: |
 Fake News on Social Media

 Spreading fake news on different incidents has become a very common phenomenon nowadays on social media. These news are contributing to increase havoc and anarchy. Different 
 types of incidents are happening every now and then in our country. Along with other news outlets, social media has become a great source of news about those incidents. But 
 this very great source is becoming a less relable one day by day. Many people don't verify the authencity of the information about an incident and share just immediately. 
 This leads to the fast spread of fake news and thus creates havoc. Now, to ensure only real and authentic news is delivered we need to create relable portals on social media 
 who will dedicatedly work on verifying and spreading authentic news. Besides, on personal level we can also try to verify by checking the dates, reverse searching the images 
 or simply googling things. before sharing something. These measure will contribute in spreading authentic news and thus create peace. Sometimes, even political parties or 
 certain groups spread fake news to get things done as their demand. These type of people must be brought under punishment by strengthening cyber act. Thus, the importance of 
 ensuring authenic news flow is great,

