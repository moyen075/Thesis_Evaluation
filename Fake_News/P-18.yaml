 feedback: |
  Score Breakdown:
  1. Content & Relevance: 1.5 / 3.0
     Reason: The submission identifies the existence of fake news and its general impacts (trolling, social conflict) but fails to provide a specific real-world example as required by the rubric for a higher score. It also misses technical mechanisms like algorithms or echo chambers.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The text is broken into numerous small fragments rather than being a single, unified paragraph. While basic transitions like 'First of all' and 'Secondly' are used, the structural unity is weak.
  3. Lexis & Academic Register: 1.0 / 2.5
     Reason: The register is informal, using colloquial phrases such as 'life hell' and 'trolling' instead of academic terminology like 'disinformation,' 'psychological impact,' or 'digital literacy.'
  4. Grammar & Mechanics: 1.0 / 2.5
     Reason: The text contains more than three errors, including spelling ('belive', 'creat'), subject-verb agreement ('people... starts'), and incorrect possessive forms ('it's validity').
  
  Overall Score: 4.5 / 10
  
  Corrective Feedback:
  1. "belive"
      Issue: Spelling error.
      Correction: believe
  2. "Society"
      Issue: Incorrect capitalization of a common noun.
      Correction: society
  3. "people really don't verify the things and starts trolling"
      Issue: Subject-verb agreement error (plural subject 'people' with singular verb 'starts').
      Correction: people really don't verify the things and start trolling
  4. "it's validity"
      Issue: Confusion between the contraction 'it is' and the possessive pronoun 'its'.
      Correction: its validity
  5. "it will creat trust issue"
      Issue: Spelling error ('creat') and lack of pluralization ('issue').
      Correction: it will create trust issues
  
  Improvement Feedback:
  1. "make a person's life hell"
      Target Area: Lexis & Academic Register
      Suggestion: Replace subjective and informal phrasing with academic language. Example: "...can result in severe reputational damage and long-term psychological distress for the victim."
  2. "[Missing real-world example]"
      Target Area: Content & Relevance
      Suggestion: To reach a higher score, cite a specific event where fake news had an impact. Example: "A clear example of this occurred during the COVID-19 pandemic, when misinformation about vaccines spread rapidly, causing significant public health challenges."
  3. "Social media is now a core platform of getting news."
      Target Area: Organization & Cohesion
      Suggestion: Strengthen the topic sentence to better introduce the argument. Example: "Although social media has become a primary news source for many, the lack of editorial oversight has facilitated the dangerous proliferation of fake news."

