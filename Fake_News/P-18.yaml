paragraph: |
 Fake News on Social Media

 Social media is now a core platform of getting news. However we need to be sure whether it is true or not. Fake news circulating on the social media has various adverse 
 effects on our society as well as in our daily life. First of all, it blocks us from getting the real news. In the modern era, we really can't belive everything we see, 
 we need to verify every news before believing it. It causes problem getting the real news. Secondly, it causes fighting among the people of the Society. When we get any 
 false news, we may accuse someone falsely and it can be a reason of fighting. Moreover, a fake news can make a person's life hell. It is quite easy now to make a viral 
 Post and accuse someone falsely. And people really don't verify the things and starts trolling the person. So, it can be a huge disaster. Not everyone can take criticism 
 lightly and Some may take wrong steps. Lastly, it will creat trust issue and people won't believe the real news either. So, steps should be taken in order to reduce the 
 fake news on social media. And we all should be more careful before sharing any post. At first, we need need to know it's validity. By taking steps, we can minimize the 
 fake news circulating all over the social media.

