paragraph_id: "P-20"

paragraph: |
 Fake News On Social Media

 Circulation of fake news on social media, a compelling recent phenomenon, works as the primary reason behind various alarming situations and impacts each and everyone badly 
 on a global basis. In recent times, social media has become a part and parcel in the daily life. However, as there remains no controlling authority to regulate these medias, 
 the amount of fake/news has increased exponentially in these spaces that eventually Can dictate the individual and collective behaviours of the concerned population. Being 
 an open to all platform, any social media can be used to spread false news and fake propaganda to the mass people. Due to the absence of authentic sources and fact checkers, 
 many people believe these news and so become affected by those. For example, in context of Bangladesh, the recent propaganda Involving "RAW" from India can be mentioned. These 
 news can be the causes of many domino effects that affect an individual, a society; a nation, and finally the whole world. The fake news Can make a person believe something 
 that is totally atrocious. These can lead to mob violence, unnecessary coalitions and can affect any good thing currently blessing the society. As an example, social media 
 propaganda was actually the tool of the fascist regime to continue its reign of terror. Hence, these fake news circulation in the social space must be observed and regulated 
 by the concerned authorities. To sum it all up, the event of fake news circulation and publication must be stopped at all costs due to the adverse effects it holds for the 
 nation as well as the globe.

