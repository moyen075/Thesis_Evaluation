 feedback: |
  Score Breakdown:
  1. Content & Relevance: 2.0 / 3.0
     Reason: The submission identifies specific reasons for fake news and provides relevant real-world examples (currency scams and religious clashes in Bangladesh). However, it falls short of the 'Exceptional' tier by failing to discuss specific social media mechanisms like algorithms, echo chambers, or the mechanics of virality.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The logical flow is functional but 'clunky.' The student split the response into two paragraphs, which violates the single-paragraph requirement of the prompt. The transition to the final 'call to action' is abrupt.
  3. Lexis & Academic Register: 1.5 / 2.5
     Reason: The register is standard and understandable but relies on common words (e.g., 'scammers,' 'horrible') rather than academic terminology like 'disinformation' or 'algorithmic bias.' Some phrasing is overly subjective/emotional.
  4. Grammar & Mechanics: 1.5 / 2.5
     Reason: There are more than three minor errors, including subject-verb agreement ('users... is'), spelling ('click bate'), and word form issues ('Many losses'), though they do not impede overall meaning.
  
  Overall Score: 6.0 / 10
  
  Corrective Feedback:
  1 "the users of social media is increasing"
      Issue: Subject-verb agreement error; 'users' is plural and requires 'are.'
      Correction: "the number of social media users is increasing."
  2 "takes places"
      Issue: Subject-verb agreement/Pluralization error.
      Correction: "takes place."
  3 "Many losses their money"
      Issue: Incorrect word class usage; 'losses' is a noun, whereas a verb is required.
      Correction: "Many lose their money."
  4 "Al we have to be cautious"
      Issue: Spelling and punctuation error.
      Correction: "Also, we have to be cautious."
  
  Improvement Feedback:
  1 "The effects of fake news on social media is horrible."
      Target Area: Lexis & Academic Register
      Suggestion: Avoid emotional adjectives in academic writing. Use formal alternatives to describe impact. Better alternative: "The societal ramifications of social media disinformation are profoundly destabilizing."
  2 "This is why scammers, propagandists use social media to circulate fake news..."
      Target Area: Content & Relevance
      Suggestion: Incorporate technical social media concepts to reach the top tier. Better alternative: "Propagandists exploit algorithmic amplification and the lack of gatekeeping on social platforms to ensure disinformation reaches targeted audiences rapidly."

