paragraph: |
 Fake news on social Media

 At present Fake news on social media is a common problem in the context of Bangladesh. There is hardly any news in social media in Bangladesh that we can trust blindly. There 
 are many reasons behind it. At the present era of globalization the users of social media is increasing day by day. It needs just a simple click to connect with the vast world 
 through the social media. This is why scammers, propagandists use social media to circulate fake news to serve their purposes. Scammers use fake news for their monetary benefits. 
 Like spreading fake news on the fall of dollar rate so they can buy dollars cheaply. Propagandists spread fake news to serve their agenda like to establish a political ideology, 
 to attract the people to their ideology. At present these scammers and propagandists use more advanced tools like AI to create fake news that is so hard to fact check. Moreover 
 many spread fake news willingly for social media views. As in the context of Bangladesh many social media users do not cross check the source of the news so it is easy to draw 
 their attentions quickly benefitting the fake news spreader. The effects of fake news on social media is horrible. First we can say the religious clash that most often takes 
 places based on fake news on social media often disturbing the religious harmony. At present many of the social media users have trust issue. As they are continuously exposed 
 to these fake click bate news that they hardly believe any important real news. Many losses their money to scammers also. Concerning govt authority should take firm steps on 
 this. Govt. should punish these scammers and propagandists so that no one ever dare to do so. Al we have to be cautious. We should cross check the source before sharing the news. 

