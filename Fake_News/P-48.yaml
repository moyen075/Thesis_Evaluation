  2. "Since people's brain is wired to prioritize threats..."
      Issue: Error in number agreement (plural possessive "people's" usually requires the plural "brains").
      Correction: "Since people's brains are wired to prioritize threats..."
  3. "...news channels and immoral people's spread fake news on social media."
      Issue: Incorrect use of possessive punctuation on a plural subject performing an action.
      Correction: "...news channels and immoral people spread fake news on social media."
  4. "So, before panicing we need to check..."
      Issue: Spelling error and missing comma after an introductory phrase.
      Correction: "So, before panicking, we need to check..."
  
