      Target Area: Lexis & Academic Register
      Suggestion: Use more precise technical terminology to describe how social media functions. Better alternative: "Social media functions as a powerful amplifier through algorithmic curation and the rapid virality of sensationalist content."
  2. "As this creates a 'them vs us' scenario in our society, communal conflict increases exponentially."
      Target Area: Content & Relevance
