paragraph: |
 Fake News On Social Media

 As news is becoming readily available to everyone fake news on social media is a growing problem. There is an over abundance of information and to maintain the limelight and 
 relevancy people are actively spreading false news which nobody bothers to check the authenticity. Fake news is the deliberate distortion of issues to incite animosity. Social 
 media is working as an amplifier as everyone uses it. People are more prone to believe whatever they see on the internet, as they accept any news which aligns with their beliefs. 
 This is called the confirmation bias. Since people's brain is wired to prioritize threats over good news, news channels and immoral people's spread fake news on social media. 
 Fake news always feels consequential and immediate, which is why most of the people don't check or read the actual source. This is very concerning as it is shaping a generation 
 with paranoia and existential dread. As this creates a "them vs us" scenario in our society, communal conflict increases exponentially. Fake news was always an impending problem 
 but social media is working as a catalyst. Because of this the problem can't be ignored anymore. Fake news thrives in an environment where critical thinking is replaced by panic 
 and hysteria. So, before panicing we need to check the actual source of the news, we see on the internet. Social media is used by every class of people so while posting something 
 how it can be interpreted should be kept in mind. In short it is through reasoned skepticism and curiosity, we can stop the proliferation of fake news on social media.

