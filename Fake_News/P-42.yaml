paragraph: |
 Fake News on Social Media

 Social media is a platform, where anyone can post or share any information or incidence without judging its authenticity. So spreading false news is easy through social 
 media platforms, misguiding a whole community. The biased mentality of people on particular community, belief often may do it intentionally to artificially create a riot 
 among diffrent community or tribes. In fact, recent inter religion battle took place in Bangladesh due to a Social media spreaded post. Unfortunately social media owners 
 doesn't care about its effect but also they focus on reach and confine user in screan more time to generate additional revenue. Additionally fake news are charming and user 
 attractive they can grab more people to social media. As a result it happens. The concsequences of fake news on social media is uncountable. Any misconception and false 
 information is harmful. Most of the fake news are biased againts a particular community. As a result it may generate hatred, jealousy, anger among people and even it may 
 lead to murder of innocent individual. When the situation goes out of the control sometimes social riots take place as major issue. Fake news in social media thus damage 
 social peace. To stop it, public awareness may play a vital role. Each individual must need to judge the authenticity of any biased news before giving a trust on it. 
 Government ant NGO'S must run campaign on fake news. Overall, to sum up on integrated approach both from Individual and the Institutions against any biased news so that 
 social damages like murder, riots may be prevented.

