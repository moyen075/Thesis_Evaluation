paragraph: |
 Fake News on Social Media

 Fake news are very harmful or even very destructive for a society. Nowadays, the number of fake news has increased at an alarming rate on the social media platforms. People 
 on the news platforms usually spread fake or exegerrated news to attract more audiences so that they can earn more money from it. They don't think much about the consequence 
 of this . Sometimes, fake news can promote hatred among different communities that Can Create clashes eventually. Sometimes, it can mislead the audiences and they can be get 
 in some dengenous situations as a result. Fake or unverified news can even leads to war between two communities or countries and there are many examples of it. For example, 
 the recent War between India and Pakistan was initiated based on the news of Pehelgam attack although there a were controversy about who did that attack. And many innocent 
 civilians were Killed without any reason. So, fake news should be eliminated immidiately. The news reporters are called the backbone of a society and the should be more responsible 
 and should verify the news properly before publishing it. General people should also be concerned and shouldn't believe any news without verifications. The responsible authority 
 should take proper actions and should implement proper laws and punishments to prevent spreading fake news.

