 circulated in Facebook & twitter in the south Asian countries are recognised as fake news by their government. This shows as how much risky it is to trust any piece of 
 information via these virtual medias. The se The reasons of circulationg of fake news in very clear. It has political, moral & religious background. Many political parties 
 and their supporters provide fake news to create terror, Social disturbance for their benifit or to threaten the apponent. Some people has a corrupted mind-set and are just 
 fond of saying false things to their ammusement on to get audience attention through the social media. They get plenty of Views on their handles, they earen money from these 
 tractinos. thus becoming more motivated to circulate fake news again. This unethical practice of self benefit is a big Obstacle for removing fake news preactice. There are 
 also a huge source of fake news from religious leaders as well. People being too sencitive of their beleif, get easily triggered and get angrey easily in they get something 
 bad about their religion. A gang uses this emotion to circulate fake news, and to create hatred towards other religion people. Because creating hatred among different 
 religion is benifitiary for them for their political or any other source of betterment. They also do it for lack of knowledge of theire own domain, willing to create hatred 
 among others. Nevertheless, these evil practice makes the society disturbed, troubled and more fragile. The remove these evil practice and to make people aware of the fake 
 news, we must at first try to understand who are the main victims. Rural people with no enough knowledge about the Society, technology and politics easily gets trapped into 
 this fake news Coop. Due to the lack of knowledge, they don't have the enough power to recheck the informations or to Crosscheck all the news they receive through social 
 media. A single scroll leads to tons of new informations and its really tough to recognise which ones are true and which ones are fake due to lack of knowledge. Thus, we must
 teach our people to become literate about current technology, society and politics. Specially a burning concern of us is Al, as it can create anything, to no matter its fake 
 or real. Morover, Social awareness should be done showing them examples of fake news to make them aware of it. Government Should create a rumor scanner System for normal people
 to check whether any information is true of false. If these steps are taken, it is possible to reduce fake news from social media and to get the full potential of cyber world.

