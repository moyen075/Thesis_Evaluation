paragraph: |
 Fake News on Social Media

 In the early twenty-first century, social media has become may be the primary source of information, specifically for "News" and putting fake news can influence hatred, 
 chaos, agitation as well as hiding evil things showing something to be peaceful. The birth of social media has replaced the conventional television or newspaper based News. 
 It is much easier to know about what's happening in the country or maybe the world by just scrolling your homepage of any social media. Even, the state leaders and famous 
 celebrities just posts up any updates rather calling a formal press conference.. This, in fact creates a dependence on Social Media that is thinking it to be some holy grail 
 of original and unbiased news. But you have to hold up for a second and reflect light on the other side of the moon too. As easier it is to pop up unbiased news in your homepage, 
 the more easier it is for some random page to come up with a fake news. Social media has no screening process, you can write anything you want, no one is holding your hand. 
 This is what: makes it much more vulnerable to fake news. And what it may cause you may ask, fake news or rumour can cause serious problem in a society, country or even in an 
 inter continental region. It can rage war, protest, mass agitation, hatred and may cause communal violence and sparking riots. For example, the recent riot sparked in London 
 was just because of a rumour posted on social media. It can also be a weapon for the tyrants. Spreading fake news of the some incidents that goes against the tyranny is a common 
 practice. It helps to suppress opposing voices. For example, the July uprising was being tried to suppress spreading false statement from the government. And the state of Israel 
 continuously hide the genocide using false news on social media. The disaster fake news bring to a society is unimaginable that is why preventive measures should be taken to stop 
 rumours from spreading. Thus, fake news is something that is a serious issue for a society or a country which may disrupt harmony that is why we must remain rational in choosing 
 what news to trust in.

