paragraph: |
 Fake News on Social Media

 Spreading fake News on social media has a great impact on the human mind and sometimes it controls the human mind and lead to a law and order detoriation. Fake news means it 
 is not true, half true and exaggerated report on a situation. In today's world, one of the communication media which is mostly used in the world that is Social Media e.g 
 Facebook, Twitter, Instagram, Linked in etc. In those media, thousands of millions of news are being spread from the each and every corner of world. But among them, a number 
 of news are fake and exaggerated. It is quite tough to justify whether it is true or not and every person is not concerned about it. The news which is most popular it is always 
 true, it is a stereotype of a majority percent of people. A number of unverified, unauthentic news is being popular to the social media user many time they starts to believe 
 it. The impact of fake news that is being published in different social media is very concerning in now-a-days. The false news is always biased and these are published to serve
 an agenda which can lead the people to worst situation. Sometimes, the false news or exaggerated news can control our thought and our intellect. Which can divert us and these 
 can fuels the people to a deterioration, violence and social injustice. Sometimes, unverified news can control our decisions. As all the social media are logic-controlled and 
 pre-programmed, sometimes algorithm can be customized in such way that the people take them as truth. The false news is very destructive in many times. There is some pre-cautionary 
 steps that should be taken in such way that the false news becomes filtered out from the newsfeed. First of all, we, the users should be very critical and we should try to know 
 the exact fact and should judge it and always keep trust in authentic source. The social media authority also can establish some filtering algorithim that false news became 
 filtered out and report them if it is false or exaggerated news. However, False news become destructive and dangerous for us sometimes. All should be very concerned about the 
 issue and should be very it critical to accept an unauthentic and unverified news.

