paragraph: |
 Fake News on Social Media

 Fake news on social media is currently an alarming issue throughout the world as it creates conflictions, disharmony, wars among the people. Fake news on social media is 
 termed as fake or false news that is intentionally created to destroy peace and harmony. Nowadays, it has become a powerful weapon for terrorist people. It creates unstability, 
 conflictions and disharmony. If it spreads out for a long it may create more concerning issues like wars. We can see around the world a lot of countries are fighting with 
 each other just based on a fake news. Many people are facing consequence of this , even though they are innocent. To solve this problem Social media like facebook, instagram, 
 youtube etc should be under control of Government. It will not allow social media to spread fake news. Social media users should also be accountable for their activities in 
 social media. If they make any types of violent activities by spreading false news, they should be under the custody of law. Government can make Some rules and regulations of 
 using social media. Public awareness is also important as a lot of people believe any kind of news blindly. People should check the news correctly before making any kind of 
 serious issues. Fake news on social media is a concerning problems around the world which should be resolved for the sake of people's harmony peace and unity. 

