paragraph_id: "P-17"

paragraph: |
 Fake News on Social Media

 In modern era, social media is the most important key to explore the current situation of the country and  world. But it also expanded the term fake news. Before social 
 media fake news could not affect that much like it does now. Fake news spreaded through newspaper and radio stations previously. Nowadays, it is spreaded nationwide and
 worldwide in lightening speed. The social media is of various kinds at present. Internet based and broadcast based media are working as social media. We, the people get 
 our news from these medias. But often these medias publish fake news and biased news just to get publicity. Social media journalists, all are not honest and truthful to 
 their work. They want to get to the center of the publicity by hot and ground breaking news. So, they take the easy path of fake news. They publish false news with a lot 
 of confidence. This also happens when journalists publish news without seeking the actual truth. When one media publishes some other medias follow the trend and that is 
 how the fake news spreads all over. Because of fake news many lives are destroyed. Because people often judge by the news published on social media. Some fake news sometimes 
 get published just to stop the trend of another news. These kind of news serve political agenda. For stopping fake news spreading, We all need to come forward. During the 
 recent July movement we all saw how fake news effects on public mind and the movement was largely effected. Now govt. should take as fast as possible whenever a fake news 
 is published in any social media. The authority should be more strict and more sharp for stopping the run of fake news on social media.

