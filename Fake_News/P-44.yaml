paragraph: |
 Fake News on Social media

 Fake News on Social media is a recurring orchestrated phenomenon aimed at spreading restlessness, dividing public opinion and democratic values and causing social disorderness 
 through misinformation and overdramatization. In this age of social media, sites like facebook holds a greater grasp of general conscience than meets the eyes. For evidence, 
 it can be showed that the whole july uprising in '24 that gained much traction and international acclaimation because of social media sites like facebook and twitter. However, 
 it can have a negative impact on general opinion as well. In social media, any news can be spread, with highly exaggerated headlines , without the need of proper credibility 
 and evidence. Gullible social media users can be swayed by such information easily and made to help spread such false narratives furthermore. As likes and reactions can be 
 bought and none is held accountable, especially small news outlets and profiles can spread misinformation after getting influenced and without any reprocussion. These headlines 
 such the seed of dubiousness in people's unity. People get divided into different groups, each groups upholding their own agenda suppressing others. This weakens the foundation 
 of democratic unity. Public opinion gets swayed due to such misinformation and do their belief worsens. Misinformation and exaggerated accusation is often used by politicians 
 to instigate general populace against their opposition. This can create political instability. Furthermore, no history has witnessed many religious and communal fights getting 
 fueled by the false narratives spreading accross social medid against each other, Thus it is certain that, fake news in social media sows the seed of uprest in society. Thus 
 every news channel and outlet, even groups must be held accountable by law. People should be media trained. Every news should be filtered accross different credible sources. 
 False news publishers should be punished and news on social media should be taken with a grain of salt. This can help halt the potential damage on society such worldwide form 
 of media can inflict.

