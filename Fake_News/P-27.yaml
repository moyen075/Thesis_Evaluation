paragraph: |
 Fake News on Social Media

 Social media is an online platform in which on can gain and share news but it is not free from corrupted news as fake news in social media is one of the biggest problem for 
 misleading people. Fake news refers to news that are not true which were manipulated to mislead people. Social media is platform which was originally introduced to make people
 connect more, share updates and news. But as information becomes more and more open to everyone, it becomes harder to separate the truth and the false news. As a result, both 
 of them being shared at once, divides people for their own believes. Fake news, rumors circulate through all over social media making keeping many people in the dark from what 
 is actually happening. there can be fake news about science, politics, technology, philosophy, literature and it has become a primary weapon to spread propaganda. Mostly for 
 political gains or personal gains fake news are spread. And also many people share the news without even verifying the truth. Fake news on social media is way to abundant and 
 for this reason, specially those who believe without cross checking are misled. Even news channels can spread fake news if it can gain any specific gain. Politically affected 
 personals, parties, new channels controlled by the gov't often spread fake news to gain advantages, support of people. Fake news divide people in groups as some believe it and 
 others who knows the truth doesn't which create a hostile environment between the two groups, erupting chaos. Often the organization or personal or political parties which 
 spreads the fake news gains a advantage with it, yellow journalism, corrupted organization or parties or even individual spreads fake news all across social media. Social 
 media is a platform where Firstly any one can share any types of news and, secondly lets individual individual share even it is fake and lastly the fastest way to reach as many 
 people as possible in a short amount of time so it becomes the most reliable platform to spread fake news. To reduce this from happening, individuals should learn the proper 
 information, news channels, reports should have freedom and must not be controlled by any means possible. By doing so the news spread can be more reliable. fake news a big issue 
 for the rise of information age; by taking enough counter measures it can be reduced in a certain degree so that no one is kept in the dark from the truth.

