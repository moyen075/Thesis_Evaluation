paragraph: |
 Fake News on Social Media

 Fake means news that doesnot have any genuine sources and most of the case old news or news of other country that. are spread in critical time. It is a big problem in 
 Bangladesh. Some people beleive that whatever they see in the internet and social media, all of them are right and they act accordingly. Spreading fake news on social 
 media is the root cause of all major problems in todays: Bangladesh. Moreover one party for their profit spread frequent fake news to shift the country's concentration 
 in a particular site so that they can earn the whole nation remain busy in that Issue, spreading fake news is many profiable for the content creators as most of the 
 people are illiterate in this country, when they see an attractive. thumbnail they cannot but watch the vedio. Fake news is very efficient in creating unrest among 
 different group of people from different religious belief. For example, in June there was a news highlighting that the muslims are destroying temple of the hindus  but 
 in reality it was the government who was destroying because the temple was in government property. Sometimes there are some fake news a addressing scarcity of different 
 goods in the country resulting  increase in price level of that good, Fake news is very dangerous for any person. The creator of the vedio or news must attach evidance 
 and proper source before spreading the news. The fake news creator must be given proper punishment and government should form a bound to look after these fake news. And 
 make people understand that they don't need to trust whatever they see in the social media.

