paragraph: |
  Fake News on Social Media
  
  Social media, in modern times, serves more as a tool for dissemination of fake news  as opposed to true and verified information. 
  Initially, social media served as a way for people to connect over the web. It served as a great tool for people to share their 
  ideas freely to an unbounded number of it. This gave people power to express their opinions, judgments and ensured their total 
  right to speech. This seemingly amazing tool, however, has been exploited by people who have found loopholes in it and feel no 
  morral quandry toward exploiting it. The lack of verification is what made social media such as amazing media / for transmitting 
  information from the minds of everyone with a smartphone and an internet connection. This had enabled people to share and post 
  whatever they like, leading to fast dissemination of information. This very attribute often helps spread news and information in 
  the blink  of an idea, but it also enables morally bankrupt individuals to spread misinformation for their a selfish benefit. News 
  like some religious leader caring a child's eyes spread like wildfire, and the algorithm in incapable of weeding out lies. 
  Propagandists often spread news of their political party accomplishing huge things, and the whole space goes into a frenzy over it, 
  yet no one verifies them. Even if they do, their attempt at clearing things up often fails because eye-catching lies often out-compete 
  boring truths at reaching people. Political parties use this very principle, a loophole, so to speak, to spread blatant lies about 
  their opponents. Once the lies reach millions of people, there is no coming back, etc. These perpetrators are often not getting caught 
  either, due to poor authentication on these social media sites. News channels are the worst culprits of this. They often exaggerate 
  the Reality, use poor research methodologies, and mix the truth with the lies in hopes of sensationalizing it enough to get views. Social 
  media sites, too, fuel these actions by recommending posts and videos of more sensational to nature to people. This has lead people, and 
  society in general, to exist in a constant state of distrust. Nothing posted on social media is trusted by many anymore people due to the 
  history of misinformation spreading that these sites have facilitated! This leads them to doubt genuinely true news, as well. The whole 
  society suffers as a result of this. Many people lose their money and assets, and become victim of fraud. It has become incumbent for 
  modern governments to address them in order to make a society built on trust and truth, where nothing of important is said after embellishing.

