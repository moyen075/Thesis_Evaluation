 feedback: |
  Score Breakdown:
  1. Content & Relevance: 1.5 / 3.0
     Reason: The paragraph addresses the topic and identifies basic impacts (instability, financial motives). However, it lacks a specific, real-world example (e.g., a specific political event or health crisis) and does not explain social media-specific mechanisms like algorithms or echo chambers.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The structure is functional with an introduction, body, and conclusion, but it is highly repetitive. The flow is clunky, with the same ideas regarding "negative impacts" and "instability" being restated multiple times without progression.
  3. Lexis & Academic Register: 1.0 / 2.5
     Reason: The vocabulary is basic and repetitive (e.g., using "very negative" and "popular" frequently). It lacks academic terminology like "disinformation," "monetization," or "algorithmic bias" and maintains an informal tone.
  4. Grammar & Mechanics: 0.5 / 2.5
     Reason: Pervasive errors in subject-verb agreement, pluralization, and punctuation occur throughout. These errors, such as "many fake news are" and "individuals shares," significantly impede the academic quality of the writing.
  
  Overall Score: 4.0 / 10
  
  Corrective Feedback:
  1. "By using the popularity of Social Media platform many fake news are often to seen everyday."
      Issue: Improper verb structure and incorrect use of "news" as a plural noun.
      Correction: "Due to the popularity of social media platforms, fake news is often seen every day."
  2. "This are very negative for our mind."
      Issue: Subject-verb agreement and vague word choice.
      Correction: "This phenomenon has a detrimental effect on the public psyche."
  3. "facebook. instagram, twitter, whatsapp etc"
      Issue: Improper capitalization of proper nouns and incorrect punctuation.
      Correction: "Facebook, Instagram, Twitter, and WhatsApp."
  4. "Many individuals shares news without checking the truth."
      Issue: Subject-verb agreement error.
      Correction: "Many individuals share news without verifying the facts."
  5. "this individuals must be on punishment"
      Issue: Incorrect prepositional phrase and demonstrative adjective.
      Correction: "these individuals should face penalties."
  
  Improvement Feedback:
  1. "This creates a very negative impact on our population."
      Target Area: Lexis & Academic Register
      Suggestion: Replace vague adjectives with formal, technical descriptions. Example: "This dissemination of misinformation undermines social cohesion and erodes public trust in democratic institutions."
  2. "Social Media is one of the most popular media in our time."
      Target Area: Organization & Cohesion
      Suggestion: Use a more focused topic sentence that links the platform to the specific issue. Example: "While social media platforms have revolutionized global communication, their architectural focus on virality has facilitated the rapid spread of fake news."
  3. "Many of them do this work only for views, popularity and money."
      Target Area: Content & Relevance
      Suggestion: Elaborate on the "social media context" by mentioning how engagement is monetized. Example: "Malicious actors often exploit platform algorithms by creating sensationalized disinformation to maximize ad revenue through increased user engagement."

