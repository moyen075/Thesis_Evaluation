paragraph: |
 Fake News on Social Media

 Social Media is one of the most popular media in our time. By using the popularity of Social Media platform many fake news are often to seen everyday. This are very negative
 for our mind. This creates a very negative impact on our population. Social Media usually referes to platform like facebook. instagram, twitter, whatsapp etc by which we 
 communicate easily with our friends, with our families and throught the world. It is very useful in our communication. We use it regular basis for our communication. It is 
 also used for publising different types of news. we see many news throught our country and within the world through facebook, youtube, instagram etc. People of all ages uses 
 social media platform. As a result. It is very common and popular media in our time. By using the popularity, sometimes we see many fake news into this platform. Different 
 people or organization broadcasts this type of news without checking the reality of the news. Many of them do this work only for views, popularity and money. They publish the 
 news without checking the truth. As a result, problems like fighting, creting unstabality among the population. Mainly, the people of our country or the people who uses facebook 
 or social media platform they believe the all news published in the social network. But when the news is fake, it creates unstability among the population. It creates many other 
 problems within the country. That creates a very negative impact into our population. Sometimes, many fight or big movement occurs as a result of this kind of fake news. The 
 effect of this is distructive. Everyone should aware of it. Many individuals shares news without checking the truth. So, in this matter, this individuals must be on punishment 
 or warning. Any organization which publishes wrong or fake news must be on sevarel punishment, We should have create more awareness about this factors by arranging many programs, 
 seminars, TV show, podcast etc and broadcast the punishment of publishing fake news. Beside this, we have also self awareness in this matter. Every person, every organization 
 must be aware on this topic. We should have to be more serious when we publish any kind of news. We check the all information before publishing any kind of news. By doing all 
 these things, the problem of publishing fake news on social media is decreased and there is no unstability among the genarel people.

