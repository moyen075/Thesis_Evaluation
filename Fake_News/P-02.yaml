paragraph: |
 Fake News on Social Media
 
 Now-a-days Social media is flooded with many fake news that creates "fake" hope, misunderstanding and misconception, People 
 believe the news on Social media without verifying the news. Thus it creates Chaos and misconception among them and people 
 lose trust and hope. Sometimes these news are circulated by the dictator government. For example: in the Israil-Gaza war, 
 the American news media only circulates the news that are favourable for Israel. They do not show the true picture of Gaza's 
 people, their struggles, condition and the havoc caused by the Israilies, People of the world may think that Israil is  
 innocent and Palestine is the enemy. But that's not the case, Even in the July revolution of Bangladesh in 2024, the dictator 
 government tried to circulate false news about the movement so that people lost their trust in the movement and became seperated. 
 In social media, after the July Revolution, the past dictator government tries to break the trust. on the interim government to 
 create chaos and destroy democracy throughout the country city. thus fake news in Social media Can mislead people and people will 
 lose their trust. It should not be happened. People must verify the news on the social media before trusting them. The government 
 also should take necessary steps to stop the circulation of fake news on social media. The government should form a disciplinary 
 team to maintain the social media platform. Awareness raising campaign should be introduced to make people aware of the fake 
 news of Social. Thus We can stop the fake news on social/media from creating chaos and havoc.

