  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The paragraph has a beginning, middle, and end, but the logical flow is somewhat disjointed, and the topic sentence is weak. The transitions between ideas are not seamless, making the text feel a bit fragmented.
  3. Lexis & Academic Register: 1.0 / 2.5
     Reason: The vocabulary used is standard but lacks technical terms specific to the field, such as disinformation, algorithmic bias, or echo chambers. The tone is generally formal but could be more objective and less conversational.
  4. Grammar & Mechanics: 1.5 / 2.5
     Reason: There are noticeable errors in grammar, punctuation, and spelling that do not severely impede understanding but are frequent enough to detract from the overall quality of the submission.
  
  Overall Score: 5.0 / 10
  
  Corrective Feedback:
  1. "Spreading false news or modifying news for personal interest on social media like facebook, youtube on any other social media is a very common thing nowadays."
      Issue: Lack of proper punctuation and incorrect use of prepositions.
      Correction: "Spreading false news or modifying news for personal interest on social media, such as Facebook and YouTube, is a very common thing nowadays."
  2. "For gaining personal interest some group of people do this shamelessly."
      Issue: Grammar and clarity.
      Correction: "Some groups of people do this shamelessly to gain personal interest."
  3. "In the contrast of Bangladesh speading fake news becomes a very common."
      Issue: Grammar, spelling, and clarity.
      Correction: "In contrast, spreading fake news has become very common in Bangladesh."
  
  Improvement Feedback:
  1. "Our polytical parties spread fake news to convince their voters, making them agains their rival political parties, to divert them from a certain topic."
      Target Area: Lexis & Academic Register
      Suggestion: Use more precise and technical vocabulary, such as "political disinformation" and "algorithmic manipulation," to elevate the discussion. For example, "Political parties disseminate disinformation to sway voters, leveraging algorithmic biases to divert attention from critical issues."
  2. "Sometimes the celebrities spread to fake news to remain in the lime light."
      Target Area: Content & Relevance
      Suggestion: Provide a specific example of a celebrity spreading fake news and analyze the impact on their audience and the broader societal context. This would add depth to the argument and make it more engaging.
  3. "We generally believe anything we see on social media."
      Target Area: Organization & Cohesion
      Suggestion: Use transitional phrases to connect this idea to the preceding discussion on the spread of fake news. For instance, "Moreover, the tendency to believe anything seen on social media exacerbates the problem, as users often share information without verifying its accuracy, thus perpetuating the cycle of disinformation."