paragraph: |
 Fake News: on Social Media

 Spreading false news or modifying news for personal interest on social media like facebook, youtube on any other social media is a very common thing nowadays. For gaining 
 personal interest some group of people do this shamelessly. In the contrast of Bangladesh speading fake news becomes a very common. Our polytical parties spread fake news 
 to convince their voters, making them agains their rival political parties, to divert them from a certain topic. Sometimes the celebrities spread to fake news to remain in 
 the lime light. It happens more than usually because of the availiability of the social media. Everyone with a social accound and a camera become a journalist. They even 
 spread a news without cross-checking. Spreading fake news damages a lot in ours society. Sometimes it causes an anwanted mob which causes a great damag for someone's family. 
 It helps growing hatred towards certain group of people. It makes the country unstable. Nowadays we generally believe anything we see on social media. We spred these falke 
 news by sharing without any verification. To prevent this both the journalist and the social media users have to be careful. We shouldn't share everything we saw in social 
 media without verifying. The digital ICT act should be made strict so that no one dare to spread false information. Sometimes spreading false information cost someone's Life 
 on everything. We all should be more conscious using social media.

