paragraph: |
 Fake News on social media

 In this world of social media, the occurrence of fake news is increasing day by day which is done in the intention of getting views and attract people's emotion. In this 
 modern era, almost every people one is using social media. As a result, a news uploaded in social media gets more attention than a newspaper: Also, as through social media, 
 people can earn money by getting more views, people are trying to attract other's emotion to let it be viral. when a sensitive news is posted which may contain religious 
 value, or political incident, people get emotional without even checking whether the news is true or not. For this treason, to get more views to earn money people some people 
 are publishing fake news on social media. most often, this fake news are related to sensitive topics, as a result people donot verify and start protesting on such fake news. 
 Such fake news are often responsible for creating unrest in the society, dividing people into many groups. As people get emotional, they fail to think logically and without 
 verifying they share those fake news on their newsfeed, people connected with them see those news and they also share and it goes on as a loop. The news gets viral and gets 
 millions of views, breaking the society's peace, meanwhile those people who publish such fake news get their targets fulfilled. This type of fake news encourages other dishonest 
 people to publish such news. As a result, the occurrence of fake news in social media is increasing at an alarming rate. As a result, people is Losing their trust in the news. 
 strict steps against this fake news can be decreased this rate. Also, general people should remain careful and before posting any news, should verify the source. By remaining 
 careful we can get out of the harm of the increasing fake news in social media.

