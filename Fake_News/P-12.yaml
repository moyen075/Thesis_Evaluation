paragraph: |
 Fake News on Social Media

 Fake news on social media is a  very concerning issue nowadays, as it impact our socio-economical life very badly. Social media has become part and parcel of our daily life. 
 It has already side-lined the mainstream media and has become the main source of information. So, any unverified news can create chaos in our society. In
 social media, there are a lot of user but, there are limited number of fact checking organisation, fact check these news, Anybody can share a news any where, any moment. 
 The other persons can watch this and he could thought as it was the real-authentic news. So, one person can be easily buffled by watch a same incident from different point 
 of view or perspective. At present, the uses of artificial intellegences has worsen this situation mare rapidly. These type of situation has decreased the online safety of 
 the user. The misuse of social media is not happenning, from not only the people's side, but also the goverment and it's security agencies are also using social media to 
 propagate the false news that they could use it from their own good. So, our daily life is in a grave threat due to this fake news. At recent world, there are many company 
 who operate fake propaganda outlet in the social media to demean their opponent. In our country, we have seen so many things like public property. vandalized, public disgrace
 of children and woman due to the false news of social media. Our religious harmony and sentiment was attacked due to the fake news and propaganda. we fall victim to this type 
 of situation so many time. So, to improve this situation, we must increase our personal ability to identify the news aunthenticity. We should not belive all of this we watch in 
 the social media. Govt should introduce strict policy to tackle this situation. Artificial Intellegence should be use to identify and fart checked the news that are spreading 
 in the social media. After all if the people of our country, should stand together, to improve and tackle the danger of fake news on social media.

