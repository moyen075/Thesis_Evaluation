  Score Breakdown:
  1. Content & Relevance: 2.0 / 3.0
     Reason: The submission identifies the consequences of fake news and mentions social media, but it remains somewhat generic. It lacks specific real-world examples (e.g., specific political events or health crises) and does not address technical mechanisms like algorithms or echo chambers required for the highest tier.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The paragraph follows a basic functional structure, but the logical flow is clunky. The topic sentence is grammatically weak (ending in a comma), and the transition between the causes of fake news and the proposed solutions is abrupt.
  3. Lexis & Academic Register: 1.5 / 2.5
     Reason: The vocabulary is appropriate and understandable but lacks precision. To reach the top tier, the student needs to incorporate technical terms like "disinformation," "algorithmic bias," or "echo chambers" rather than relying on common phrases.
  4. Grammar & Mechanics: 1.5 / 2.5
     Reason: There are several minor errors throughout the text, including subject-verb agreement with uncountable nouns, spelling, and punctuation. While these do not impede meaning, they exceed the "1–3 slips" threshold for the highest marks.
  
  Overall Score: 6.0 / 10
  
  Corrective Feedback:
  1. "Fake news on social media is a severe problem... for the betterment of the society,"
      Issue: The opening sentence ends with a comma instead of a period, creating a run-on feel.
      Correction: ...for the betterment of society.
  2. "fake news that are entertaining"
      Issue: "News" is an uncountable noun and requires a singular verb.
      Correction: fake news that is entertaining
  3. "money. and people even share"
      Issue: Coordination/Capitalization error after a period.
      Correction: money. Furthermore, people often share
  4. "if a news about fake racism"
      Issue: "News" is uncountable and should not be used with the indefinite article "a."
      Correction: if news regarding racism
  5. "celebrities personal life"
      Issue: Missing possessive apostrophe for the noun "celebrity."
      Correction: celebrity's personal life
  6. "sourice"
      Issue: Spelling error.
      Correction: source
  
  Improvement Feedback:
  1. "One of the biggest reasons of spreading fake news on social media is yellow journalism."
      Target Area: Content & Relevance
      Suggestion: To move from "Competent" to "Exceptional," explain the role of social media technology. Example: "The rapid dissemination of fake news is primarily driven by algorithmic bias, which prioritizes engagement and virality over factual accuracy."
  2. "Fake news can cause communal riots..."
      Target Area: Content & Relevance
      Suggestion: Provide a specific real-world example as requested by the rubric. Example: "This was evidenced by the 2013 Muzaffarnagar riots, where social media misinformation was cited as a primary catalyst for violence."
  3. "So, fake new should be prevented from spreading."
      Target Area: Lexis & Academic Register
      Suggestion: Use more formal, academic terminology to maintain an objective stance. Example: "Consequently, robust measures must be implemented to mitigate the proliferation of disinformation."

