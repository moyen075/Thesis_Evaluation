paragraph_id: "P-22"

paragraph: |
 Fake News on Social Media

 Fake news on social media is a severe problem in the modern world having dreadful effects like riots, communal clashes, mob justice, economic crisis etc. and so, it should 
 be stopped for the betterment of the society. Fake news spread really fast nowadays because of social media. One of the biggest reasons of spreading fake news on social media
 is yellow journalism. Some self claimed journalists post fake news that are entertaining to the viewers just to earn some fame and money. and people even share these news 
 without crosschecking. Fake news can cause communal riots if a news about fake racism or discrimination is published. Fake news about somebody can concentrate public hatred 
 towards the person and in the worse case scenario, he or she can become a victim of mob justice. Moreover, fake news about a celebrities personal life can destroy his career 
 and lead him to suicide. Furthermore, fake news about share market on banks can cause panic in the common people and this may lead to a national economic crisis. So, fake 
 new should be prevented from spreading. Few steps can be taken for that. Firstly, social media users should be more careful before trusting any sort of news from any sourice 
 and they should crosscheck it before sharing. Secondly, law should be implemented to punish such yellow medias that publish fake news. Lastly, the government should have its 
 own media cell to debunk the fake news and publish truth to the common people.

