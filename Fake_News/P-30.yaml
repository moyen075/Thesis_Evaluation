paragraph: | 
 Fake News on Social Media

 Fake or inappropriate news are spread on social media which changes the mass people's view on any issue from the positive to negative side and creates unnecessary violence 
 both online and offline which may sometimes led to dreadful actions causing harm to people. Nowadays, Social media is very easy to access. Anyone from any part of the world 
 can post or comment whatever he/she wants. Though, social media used to serve communication purposes primarily, it has now become a platform that is a part of everyone's 
 daily life. People share everything from their life and events here. Though, it is a very useful tool for making communication very easier, very cheaper, many people use it 
 for meeting their personal bad intentions. Whenever there is a national issue or any international issue, social media gets filled with many news that are false and have no 
 source from where they are collected. These are called fake news. These news are spread intentionally to create chaos in the society. The fake news go viral faster on the 
 social media and as a result, the publishers can earn more money than publishing the true news. Sometimes, one political party spreads fake news about their rival parties to 
 get dominance over them. Fake news often leads to unnecessary violence in the society, country or even in the world, Political parties are seen often colliding with each 
 other both verbally and often by unnecessary meetings and rallies which cause great sufferings to the normal people. Sometimes, fake news becomes so great in numbers that 
 people can hardly able to know about the real news about any topic. People of different views often get in trouble stuck among the fake news every where. In order They also 
 hamper childrens very badly. Childrens, because of having soft minds and fresh brain, believe everything they see in front of their eyes. In fact, a generation can be lead 
 to the wrong path by fake news. The government, law enforcing agencies, social media and internet service providers should take necessary against the people who spread social 
 media. In this way, we can make social media usable for everyone, make a useful tool for communication as expected.

