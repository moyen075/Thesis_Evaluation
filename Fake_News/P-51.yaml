paragraph: |
 Fake News on Social Media

 The reasons behind fake news on social media are too many and the bad effects of this on general public are not even imaginable. Several things are acting behind fake news. 
 Some greedy businessmen tries to make false news so that they can sell their product at high price and make unreal profit. Some of them do so to make illigal hunting, 
 poaching easier. Some try to make people frightened to keep them far away from the truth by fake news. There are also some politicians, smagglers and other bad people who 
 create fake news to mislead the people and create chaous and rule over them. For fake news they choose social media because it is very easy to reach to a large number of 
 people through social media within a very short time and thus their wish become successful so fast. The effects of fake news on social media are misearable. Because of fake 
 news, chaous is created very easily and quickly at any place, a lot of valuable wealth, resources , institution etc get damaged because of so called mob justice or mob 
 violence, many a men get killed during the period without any reason, many family suffer a lot because of these fake news . Sometimes, these fake news spreaded on Social 
 media leads to greater violence that become a threat for the sovereignty of the country also, it can create cold war situation inside the country and leads to a greater lose 
 that cannot be recovered. Finally it can be said that the reasons and effects of fake news on social media are too many that cannot be described in words, it can just feel.

