paragraph: |
 Fake News on Social Media

 Fake news on Social Media; a great problem in mordern age is caused by unawareness of people, availability of social media and result in mass chaos, unstability in society 
 etc. Fake news means something doesn't happed but some people spread this news to create chaos and social unstability. Now-a-days Facebook, Whatsapp, instragram etc. are 
 very avaiable in the world. Every person who has a mobile phone has an account on this social media platform. If some people or a person spread some unreal then people who 
 are unaware about the cause and effects of the news share it. Though he doesn't even know it is true or not. When any fake news spread among the millions social media 
 subscribers it create chaos among the socity. At first, unawareness of sharing any news in social media is the main cause of spreading the fake news. Secondly, nowadays most 
 of the people in the world use social media. So Social Media become available in every country. If anyone share a fake news, there is a lack of monitoring which is the great 
 cause of the spreading of fake news. Sometimes something doesn't happend in anyone can make a AI based fake news and spread it among the millions of users. As a result of 
 spreading fake news creates social chaos, unstables the socities, moreover destroys the peace of a nation etc. Sometimes, bad peoples creates fake news on sensitive topics 
 like religious which creates social chaos among two groups of people in a society which destrory the peace of the people. Sometimes it become a war or civil war, Sometimes, 
 those who tries to unstable a country, they make fake news on a sensitive subject and spread it through social media and it atacks the emotions of the millions. So fake news 
 is a great problem in the world now-a-days and it is very easy to spread among millions of people by social media. As there is a lack of monitoring and unawareness of people 
 so it becomes a great issue for the peace of a country or society. In conclusion, fake news causes a social unstability and creates chaos among the people and it is spread 
 through social media among millions of people, so it is a great problem in our world.

