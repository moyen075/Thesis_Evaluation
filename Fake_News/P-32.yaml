      Target Area: Content & Relevance
      Suggestion: Provide a more nuanced definition of fake news, discussing its implications and the role of social media in its dissemination. For example, "Fake news refers to fabricated information that is spread through social media platforms, often aiming to create chaos and social instability, and can be particularly dangerous due to the viral nature of online content."
