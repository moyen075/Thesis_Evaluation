  Overall Score: 4.5 / 10
  
  Corrective Feedback:
  1. "Fake news on Social Media; a great problem in mordern age"
      Issue: Spelling error and lack of formal tone.
      Correction: "Fake news on social media is a significant problem in the modern age."
  2. "something doesn't happed but some people spread this news to create chaos and social unstability."
      Issue: Grammar and spelling errors.
      Correction: "something that did not happen, but some people spread such news to create chaos and social instability."
  3. "Now-a-days Facebook, Whatsapp, instragram etc. are very avaiable in the world."
      Issue: Informal language and spelling errors.
      Correction: "Currently, Facebook, WhatsApp, Instagram, etc., are widely available worldwide."
  
