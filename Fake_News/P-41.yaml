paragraph: |
 Fake News on Social Media

 Fake news, referring to fabricated, false, half-false or made-up news or information, spreads so fast in social media that it has become a mentionable threat to social 
 stability and peace. Fake newas has always been a concern, but in recent times, owing to social media it has reached a new dimension. Years before, people used to get 
 their respective news from electronic and mainly print media. At that time, there was fake news too. However, there were regulatory bodies which could control and rectify 
 false news. However, in case of social media, there is no such monitoring or rectifying. Anyone can post or upload anything he/she wants. More importantly, others don't 
 verify the news and still they believe it. Even, people spread unverified news without any responsibility. All these can lead to a bad-to-worse situation. Fake news can 
 cause unstability in society. In many countries, it is reported that false news is circulated to marginalize and corner the unprevelieged part of society especially 
 religious minority and women. Sometimes, fake news causes political unrest as fake news is often circulated against political parties. So, fake news divides the society 
 into pieces. Moreover, fake news causes panic among mass people. In Bangladesh, a woman was killed in Dhaka by general people accusing her being a child killer who collects 
 children's skull for Padma Bridge. So, fake news is a threat to a peaceful society. By any means, this should be faced and navigated. First of all, government should monitor 
 social media like Facebook, Twitter through independent agencies. Government must not intervene in the process as it can result in further chaos. Secondly, government ministries 
 and social influencers should act a great role in facing the challange of fake news. Thirdly, mass people should be aware of the impact of fake news on social media. They should 
 verify any information before sharing with others. If Last but not least, mainstream electronic and print media must play a great role in debunking false news and spreading the 
 truth. By taking these measures, we can free our society from the evil grasp of fake news on social media and maintain peace and stability in society.

