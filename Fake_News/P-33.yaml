paragraph_id: "P-33"

paragraph: |
 Fake News on Social Media

 Fake news, circulating on social media is continuously depriving the users from their information rights and has become threat for our national and regional security. Almost 
 everyone of this modern world has social media access. As there is no control on social media, informations are not always verified. As social media, has a lot of users, any 
 type of information circulates there very fast. The deficiency of authorized control, fact checking organizations are important reasons of this problem. People also are not 
 conscious what they are consuming, beliveing in social media. People share any kind of sensitive news without verifying. That's why fake news circulates more faster. In our 
 country, lots of people are illiterate and they don't even know to the verify a news, The result of fake news is very harmful. As by social media, fake news circulates very 
 faster, it can create a chaos at any place without giving enough time to resist for the administration. In recent days, Bangladesh experienced many mob violences due to fake 
 news. This fake news can create unnecessary and unwanted violence. Its a treat to our national security. Fake news about hindu-muslim conflict has very harmful impact on the
 security of Bangladesh. It creates religious chaos and destroys harmony. As it is on social media, people from other countries can see the news and therefore we experienced 
 clash on social media which is very bad to the friendship between two country. Fake news can be encounted by taking proper action. Tracing fake news sites, having fact check 
 authority, creating concern among mass peoples are good options. Therefore we can say, fake news on social media is should be controlled to have a stable and violence free 
 society and country. It should be done with serious concern.

