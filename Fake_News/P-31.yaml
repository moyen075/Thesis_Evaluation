  Score Breakdown:
  1. Content & Relevance: 2.0 / 3.0
     Reason: The student identifies the issue and provides a specific real-world example from Bangladesh politics. However, the analysis is generic and misses social media-specific mechanisms like algorithmic bias or virality as required for the highest tier.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The paragraph has a basic structure (introduction, consequences, and solutions), but the logical flow is clunky and transitions are weak. It lacks a sophisticated Point-Evidence-Explanation (PEE) structure.
  3. Lexis & Academic Register: 1.5 / 2.5
     Reason: The vocabulary is standard and often conversational ("make the hell out of," "what to do?"). It fails to utilize technical terminology such as 'disinformation' or 'echo chambers.'
  4. Grammar & Mechanics: 0.5 / 2.5
     Reason: The submission contains pervasive errors in spelling (propangand, instragram, belive, ovoide), capitalization (july, fb), and punctuation (sentence fragments) that significantly impede reading.
  
  Overall Score: 5.0 / 10
  
  Corrective Feedback:
  1. "common phenomenon. in our day to day life."
      Issue: Sentence fragment and improper use of punctuation.
      Correction: "...common phenomenon in our day-to-day lives."
  2. "It con be from TV"
      Issue: Spelling error/Typo.
      Correction: "It can be from TV..."
  3. "instragram, twitter, thread"
      Issue: Proper nouns are not capitalized.
      Correction: "Instagram, Twitter, and Threads."
  4. "leads finantial loses"
      Issue: Spelling errors and missing preposition.
      Correction: "...leads to financial losses."
  
  Improvement Feedback:
  1. "Fake News on social Media is common phenomenon."
      Target Area: Organization & Cohesion
      Suggestion: Replace the weak opening with a more formal topic sentence. Example: "The proliferation of disinformation on social media platforms has emerged as a significant threat to social stability and informed public discourse."
  2. "BAL or Bangladesh awami League fb page continusly spread fake news"
      Target Area: Lexis & Academic Register
      Suggestion: Use academic terminology to describe the behavior of institutions. Example: "Political entities have been observed utilizing social media platforms to disseminate state-sponsored propaganda and coordinated disinformation campaigns."
  3. "Fake news are spreads from our continous sharing."
      Target Area: Content & Relevance
      Suggestion: Address the technical mechanisms of social media to reach the top rubric tier. Example: "The rapid spread of fake news is facilitated by platform algorithms that prioritize sensationalist content to maximize user engagement."

