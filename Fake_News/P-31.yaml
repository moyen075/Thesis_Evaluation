 Fake News on Social Media

 Fake News on social Media is common phenomenon. in our day to day life. We all see news, It con be from TV, Newspaper or can be any social media like facebook, instragram, 
 twitter, thread etc. We all came across fake news, propaganda and scam. Fake news and rumers are here and there. At first glance we can't tell its fake on real. Let's say 
 a real life example. In the last revolution of july, most of media was forced to telecast propangand. In the social media, BAL or Bangladesh awami League fb page continusly 
 spread fake news and propaganda. There are lot's of aspect whe social media spread fake news : It can be gambing site, international news, political propaganda, scandal about 
 celebrities etc. At a surface level most of the us believe that and make our judement from initial news. There are lot's of drawback and serious concequences for that. Like 
 firstly a fake news about regious sentiment can make a massive out brust in no time. It can leads to serious misunderstanding and hurt people sentiment. A fake news about a 
 celebrities can make the hell out of the celebrities life. In extreme case it can leads to suicide or serious truma in their life. Fake news about betting site and investment 
 side can attracted socially unaware people which leads finantial loses. So what to do. What's the solution? There are lot's of way to ovoide them. Firstly we will not share any 
 controversial topic like regilious, political conflict without proper source and prove. Fake news are spreads from our continous sharing. Secondly we should make judement from 
 seeing a post or comment. We will wait sometime and after sometime based on the prove and source we will make our own decision: Mostly elderly people belive what they see in 
 social media. We should make them understand the negative side of the fake news. There are lot's of things we must avoide. So therefore fake news can be leads some unexpected 
 events. We all should social aware and concious about Fake News on Social Media.

