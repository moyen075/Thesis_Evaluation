paragraph: |
 Fake News on Social Media

 Spread of fake news on social media is one of the burning questions in today's world must be addressed by finding the key factors and considering its impacts. A particular 
 group of people spread fake news for their particular purpose and the society is facing its drawbacks, Social media algorithms boost the content that engage people to online 
 for a longer time. without judging if they are true or fake. Most of the fake news are designed to spark fear, anxiety, surprise, division amound people and thus people 
 interact with these platforms for a longer time. So these kind of contents are boosted by the social media algorithms. Also there's a tendency among people to spread fake and 
 false news faster and deeper. Also sometimes AI genenated news are so realistic that it's nearly impossible to distinguish from the truth. A particular ideologist is using 
 these tools and implementing their purpose by spreading false news. Nowadays people spend much time in scrolling social media and don't judge the sources of information. For 
 a large number of people social media is the key source of information. So these fake news are polarizing people in extreme ideologies, creating unrest and divisions. These 
 fake news are sometimes so intense that they lead to clash among people and sometimes notivate to murder the people of opposite views. These news accelerate tension among 
 people and sometimes lead to cardiac arrest. It's like an pandemic in today's world often regarded as infodemic. Addressing this issue is much difficult as it requires much 
 supervision of the authority. But the users can be aware while consuming any information and justify the source. Finally it's not a matter of emotion but a matter of necessity 
 to find the mobilizing factors of spread of fake news and address to save the world from the cruel claws of this phenomenon.

