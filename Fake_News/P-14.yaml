paragraph: |
 Fake News on Social Media

 Fake news on social media refers to the news that is completely of partially untrue and has been spread for personal gain, political gain on just to cause unrest in society. 
 Due to the rise of social media like Facebook, Tik Tok on Instagram etc., we are now more connected than ever and can instantly get news from any part of the world. But since 
 anyone can share any news without verifying it, sometimes intentionally on unintentionally altered news  gets shared. Someone may edit a video or crop a picture in such a way 
 to make his victim look bad. Someone can also impersonate another person to cause harm to him. This causes the victim a great deal of trouble both online and offline. In this 
 way, even a single individual can ruin someone's reputation for his personal gain. But there is another more common type of fake news, political fake news. A political party 
 can use their workers to spread defamatory news about their opposing party or  claim somone else's humanitarian work as their own. Especially during election times, all types 
 of Social media gets flooded with fake political news because of the party's followers spreading it. There is another type of fake news that circulates social media that benefits 
 no one but only causes chaos. News that has been accidentally altered on misunderstood evokes strong emotions in anyone who comes across int in their feed. This causes them to 
 engage with it and increase its visibility. So everyone else also believes it to be true and gets angry at it, This causes social instabity without any motive behind it. After 
 all, social medias are designed to spread content without verifying any thing. So it is our job to know how to spot fake news and report it without engaging with it to keep our 
 feeds free from fake news.

