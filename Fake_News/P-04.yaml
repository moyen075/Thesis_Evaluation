gemini:
 score: 6.0
 feedback: |
  Score Breakdown:
  1. Content & Relevance: 2.0 / 3.0
  	 Reason: The student addresses the prompt by explaining why fake news spreads and its consequences. However, the analysis is somewhat generic, and the 'real-world example' provided is a hypothetical scenario rather than a specific, named event (e.g., Pizzagate or COVID-19 misinformation).
  2. Organization & Cohesion: 1.0 / 2.0
  	 Reason: The paragraph is functional with a beginning, middle, and end, but the topic sentence is weak as it focuses on social media in general rather than fake news. The logical flow feels clunky due to repetitive sentence structures.
  3. Lexis & Academic Register: 1.5 / 2.5
  	 Reason: Vocabulary is standard and appropriate for general communication but lacks technical terminology such as 'disinformation,' 'echo chambers,' or 'algorithmic bias.' Some phrasing is slightly informal ('Sketchy,' 'it's scary' tone).
  4. Grammar & Mechanics: 1.5 / 2.5
  	 Reason: There are several errors, particularly with the use of the uncountable noun 'news' (e.g., 'a fake news,' 'news are'), capitalization, and word class. However, these do not significantly impede the reader's understanding.
  
  Overall Score: 6.0 / 10
  
  Corrective Feedback:
  1. "Every body can have his social media account"
  	Issue: 'Everybody' should be one word; 'his' is non-inclusive.
  	Correction: "Everybody can have their own social media account."
  2. "no matter it's true or false"
  	Issue: Incorrect phrasing for a concessive clause.
  	Correction: "regardless of whether it is true or false."
  3. "A fake news of criminal may be Spread."
  	Issue: 'News' is uncountable and cannot take an indefinite article; 'Spread' should not be capitalized.
  	Correction: "Fake news regarding a criminal may be spread."
  4. "If social media fake news are exposed"
  	Issue: Subject-verb agreement error with an uncountable noun.
  	Correction: "If fake news on social media is exposed"
  5. "Everyone should Sketchy about news"
  	Issue: Misuse of an adjective as a verb and incorrect preposition.
  	Correction: "Everyone should be skeptical of news"
  
  Improvement Feedback:
  1. "Many social media pages or groups tend to create fake, eye-catching news for reach."
  	Target Area: Lexis & Academic Register
  	Suggestion: Use technical social science terms to describe the phenomenon. Alternative: 'Numerous digital entities disseminate sensationalist disinformation to exploit algorithmic reach and maximize user engagement.'
  2. "For instance, A fake news of criminal may be Spread."
  	Target Area: Content & Relevance
  	Suggestion: Replace this hypothetical example with a specific historical or current event to reach the 'Exceptional' tier. Alternative: 'For example, the proliferation of misinformation during the 2016 US Election demonstrated how digital rumors can destabilize political trust.'
  3. "His personal life may be destroyed"
  	Target Area: Lexis & Academic Register
  	Suggestion: Use more formal, objective language rather than emotive verbs. Alternative: 'Such disinformation can result in severe reputational damage and long-term psychological consequences for the individual involved.'



