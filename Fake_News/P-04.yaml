paragraph_id: "P-04"

paragraph: |
 Fake News on Social Media
 
 Social Media is a form of media that anyone can access, comment, analyze from anywhere. Every body can have his social media account and access to anywhere. Not everybody 
 has a fact checking ability always, as a result, any news can be spread through the Social media no matter it's true or false. Many social media pages or groups tend to 
 create fake, eye-catching news for reach. People not knowing the truth share and comment on the news out of curiosity. For instance, A fake news of criminal may be spread. 
 As a result, fears and fake awareness may be increased. Public tension may uprise as well. Again, a personal fake news of somebody is circulated, this may bring terrible 
 toll on him. His personal life may be destroyed, fake news about government may increase public tension and mistrust. If social media fake news are exposed, then any real 
 concerning issue may seem not trustable to many. Real issues may not get proper attention and also people may not believe real, authentic media at all. As a result, there 
 would be no meaning of media. In order to stop fake news on social media laws and regulations must be strict. There must be laws about the fake news publishers. Any publisher 
 without verifying, if publish a news, he must face consequences. Also, people should know how to verify any news. Everyone should Sketchy about news on social media and 
 fact-check everything. To summarize, social media fake news is a real threat to public peace and prosperity. We should handle social media wisely. People should give a second 
 thought before believing everything and social media must be handled with strict law.

