  4. Grammar & Mechanics: 1.5 / 2.5
     Reason: There are minor issues with grammar, punctuation, and spelling that do not significantly impede the meaning but are noticeable.
  
  Overall Score: 5.5 / 10
  
  Corrective Feedback:
  1. "Social Media is a form of media that anyone can access, comment, analyze from anywhere."
      Issue: The sentence is somewhat informal and lacks specificity.
      Correction: Consider rephrasing to "Social media platforms provide universal access, enabling users to engage, comment, and analyze content from any location."
