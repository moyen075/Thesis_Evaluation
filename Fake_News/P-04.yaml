  2. "In order to stop fake news on social media laws and regulations must be strict."
      Target Area: Lexis & Academic Register
      Suggestion: To improve the academic register, use more formal and technical vocabulary, such as "Implementing stringent regulations and laws is crucial to mitigate the dissemination of fake news on social media platforms."
