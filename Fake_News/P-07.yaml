gemini:
 score: 5.0
 feedback: |
  Score Breakdown:
  1. Content & Relevance: 2.0 / 3.0
     Reason: The student addresses the prompt and mentions social media mechanisms like algorithms. However, the impact analysis is generic and lacks a specific, named real-world example required for the top tier.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The paragraph has a basic structure, but the logical flow is clunky. It lacks a clear Point-Evidence-Explanation (PEE) structure, and transitions between ideas are weak.
  3. Lexis & Academic Register: 1.5 / 2.5
     Reason: While the student uses the term "algorithm," the register is often informal, relying on idioms (e.g., "gone through the roof") and subjective descriptions (e.g., "selfish and dishonest") rather than academic terminology.
  4. Grammar & Mechanics: 0.5 / 2.5
     Reason: There are pervasive errors throughout the text, including subject-verb agreement (news are), spelling (fore, infront), and syntax issues (Through instead of Though) that hinder readability.
  
  Overall Score: 5.0 / 10
  
  Corrective Feedback:
  1. "Fake news are seen"
      Issue: Subject-verb agreement. "News" is an uncountable noun and takes a singular verb.
      Correction: Fake news is seen
  2. "digs the grave fore truth"
      Issue: Spelling error.
      Correction: digs the grave for truth
  3. "infront of everyone"
      Issue: Spelling error (compound word).
      Correction: in front of everyone
  4. "Through social media platforms are trying hard"
      Issue: Incorrect word choice/conjunction. The author likely intended to show contrast.
      Correction: Although social media platforms are trying hard
  5. "this medias"
      Issue: Number agreement. "This" is singular, while "media" is plural (or used collectively).
      Correction: these media platforms
  
  Improvement Feedback:
  1. "skyrocketed and gone through the roof"
      Target Area: Lexis & Academic Register
      Suggestion: Replace informal idioms with formal, precise language to improve the academic tone. Alternative: "has increased exponentially and reached unprecedented levels."
  2. "some selfish and dishonest person"
      Target Area: Lexis & Academic Register
      Suggestion: Use more objective and professional terminology. Alternative: "malicious actors and entities seeking to manipulate public opinion for personal gain."
  3. "Companies face huge fall in stock prices"
      Target Area: Content & Relevance
      Suggestion: To reach the exceptional level, provide a specific real-world example. Alternative: "For example, a fraudulent tweet regarding an explosion at the Pentagon in 2023 caused a temporary but significant decline in the S&P 500."

