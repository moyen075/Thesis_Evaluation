paragraph: |
 Fake News on Social Media

 Social media nowadays is flooded with fake news which distracts its users from authenticity and digs the grave fore truth which should've come to light. Fake news are seen 
 here and there while scrolling through any some of social media page same of which are so well prepared that people fall for it easily until the truth is brought infront  
 of everyone. With the rise of social media, the amount of fake news has skyrocketed and gone through the roof. It is mainly caused by some selfish and dishonest person who 
 try to gain the most out of it by. spreading it at a mass scale for their interest. Soometimes celebrity lives are ruined because of it, Companies face huge fall in stock 
 prices due to fake rumours and some take the advantage out of it within the period till everything's cleared up. Through social media platforms are trying hard to not letting 
 it spread using their algorithm, it's not sufficient enough as of today. As people have access to this medias within their wrists, it's getting so out of control that a little 
 misinterpretation of something letting it can cause severe consequences. Those who are new to this virtual world fall for this traps so easily that they're the main target of 
 those selfish people who spread fake news just because they would take advantage of the artificially created situation. We should all be aware of what is authentic and what 
 is most likely to be fake before judging anything or believing in whatever we see on social media. We have to keep in mind that social media is just for a virtual world made 
 for entertaining us and if we're not paying for it we are the product. So, we should not believe everything we see on social media. We should be critical and judge using the 
 facts.

