  Score Breakdown:
  1. Content & Relevance: 1.5 / 3.0
     Reason: The submission addresses the topic of fake news on social media but lacks depth in its argument and specific evidence. It touches on the consequences and attempts to provide examples but remains somewhat generic and surface-level.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The paragraph has a beginning, middle, and end but lacks a clear topic sentence and seamless transitions between ideas. The flow is somewhat clunky, making it hard to follow the logical progression of the argument.
  3. Lexis & Academic Register: 1.0 / 2.5
     Reason: The vocabulary is standard and understandable but relies heavily on common words rather than academic or field-specific terminology. The tone is mostly formal but could benefit from more precise and technical terms related to social media and fake news.
  4. Organization & Grammar & Mechanics: 1.5 / 2.5
     Reason: There are minor issues with grammar and mechanics, including missing commas, singular/plural slips, and some syntax errors that do not significantly impede the meaning but detract from the overall clarity.
  
  Overall Score: 5.0 / 10
  
  Corrective Feedback:
  1. "Social media nowadays is flooded with fake news which distracts its users from authenticity and digs the grave fore truth which should've come to light."
      Issue: The sentence contains grammatical errors and awkward phrasing.
      Correction: Social media is currently flooded with fake news, distracting users from authentic information and potentially burying the truth that should be revealed.
  2. "Fake news are seen here and there while scrolling through any some of social media page same of which are so well prepared that people fall for it easily until the truth is brought infront  of everyone."
      Issue: The sentence has multiple grammatical errors and lacks clarity.
      Correction: Fake news can be seen while scrolling through social media pages, some of which are so well-prepared that people easily fall for them until the truth is revealed to everyone.
  3. "With the rise of social media, the amount of fake news has skyrocketed and gone through the roof."
      Issue: The sentence uses a cliché and lacks specificity.
      Correction: The proliferation of social media has led to a significant increase in fake news, with the number of cases rising dramatically.
  
  Improvement Feedback:
  1. "Social media nowadays is flooded with fake news"
      Target Area: Content & Relevance
      Suggestion: To elevate this, consider providing specific examples or statistics about the prevalence of fake news on social media platforms, such as "According to recent studies, social media platforms have seen a 50% increase in fake news stories over the past year."
  2. "We should all be aware of what is authentic and what is most likely to be fake before judging anything or believing in whatever we see on social media."
      Target Area: Lexis & Academic Register
      Suggestion: Use more precise language, such as "It is essential to develop critical media literacy skills to discern between authentic and potentially fake information on social media."
  3. "We have to keep in mind that social media is just for a virtual world made for entertaining us and if we're not paying for it we are the product."
      Target Area: Organization & Cohesion
      Suggestion: This sentence, while insightful, feels somewhat disconnected from the rest of the paragraph. Consider integrating it more smoothly into the argument, perhaps by using it as a concluding thought or by expanding on how this reality exacerbates the fake news problem.
 