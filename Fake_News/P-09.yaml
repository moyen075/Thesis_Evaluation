 feedback: |
  Score Breakdown:
  1. Content & Relevance: 2.0 / 3.0
     Reason: The paragraph addresses the prompt and identifies consequences like mistrust and social unrest. However, it lacks a specific real-world example (e.g., a specific election or health crisis) and does not explain social media-specific mechanisms like algorithms or echo chambers.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The paragraph has a basic structure but the logical flow is clunky. Several sentences start with repetitive conjunctions ("So," "As"), and there is a significant sentence fragment that disrupts the flow.
  3. Lexis & Academic Register: 1.5 / 2.5
     Reason: The vocabulary is appropriate and functional (e.g., "harmony," "enmity," "deliberately"). However, it lacks technical academic terms like "disinformation," "algorithmic bias," or "digital literacy."
  4. Grammar & Mechanics: 0.5 / 2.5
     Reason: There are pervasive errors exceeding the "1-3 slips" limit, including spelling mistakes (decieve, evenything), subject-verb agreement (people suffers), sentence fragments, and incorrect verb forms (needs to be address).
  
  Overall Score: 5.0 / 10
  
  Corrective Feedback:
  1. "...platform to decieve people..."
      Issue: Spelling error.
      Correction: ...platform to deceive people...
  2. "As the whole world is connected by the social media. Any news is spread..."
      Issue: Sentence fragment; the first clause is dependent and should not be a standalone sentence.
      Correction: As the whole world is connected by social media, any news is spread...
  3. "...many people suffers after believing..."
      Issue: Subject-verb agreement error.
      Correction: ...many people suffer after believing...
  4. "...needs to be address."
      Issue: Incorrect passive voice construction.
      Correction: ...needs to be addressed.
  5. "More over, who we all should be careful..."
      Issue: Incorrect word choice and spacing.
      Correction: Moreover, we all should be careful...
  
  Improvement Feedback:
  1. "Many people with bad intentions are using social media as a tool to spread fake news."
      Target Area: Lexis & Academic Register
      Suggestion: Use more precise terminology to describe actors and actions. Revised: "Malicious actors utilize social media platforms to propagate disinformation for personal or political gain."
  2. "The effect of fake news spreading is so severe that people got killed."
      Target Area: Content & Relevance
      Suggestion: Replace vague statements with a specific real-world example to reach the "Exceptional" tier. Revised: "The severity of disinformation is evident in incidents like the 2016 US election or the spread of COVID-19 misinformation, which led to public health crises and civil unrest."
  3. "Any news is spread very quickly, without any verification."
      Target Area: Content & Relevance
      Suggestion: Incorporate specific social media mechanisms. Revised: "The algorithmic nature of social media prioritizes engagement over accuracy, allowing unverified content to go viral within echo chambers."

