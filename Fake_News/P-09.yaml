paragraph_id: "P-09"

paragraph: |
 Fake News on Social Media

 Fake news in social media has become a burning issue throughout the world which is considered to be a threat to social and regional peace as it disturbs the harmony
 of the society by creating mistrust, hatred, enmity towards each other. Now, we live in the digital age where almost everyone uses social media, Social media is a very
 useful tool for communication. But it is being used as a platform to decieve people by spreading fake news. As the whole world is connected by the social media. Any news 
 is spread very quickly, without any verification. As a result a lot of fake news can get spread widely and it is a now very common. Many people with bad intentions are
 using social media as a tool to spread fake news. Even, sometimes people shame fake news without even being aware. Fake news creates mistrust as many people suffers after 
 believing the news. So, it creates a division among people. Some people deliberately spread fake news which can start a clash between two particular communities. They do it
 to realise their personal agenda. The effect of fake news spreading is so severe that people got killed. So, fake news in social media is a very big problem which needs to 
 be address. The government along with the technology companies should try to verify the news being spread. More over, who we all should be careful about believing evenything 
 from social media. Awareness should be spread about it. Then we will overcome this problem and will be able to live together peacefully.

