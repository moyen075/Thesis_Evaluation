paragraph_id: "P-49"

paragraph: |
 Fake News on Social Media

 Fake news on Social media are the false informations, rumors and hoax that are spread intentionally in the social media like Facebook, X, Youtube etc to serve unethical 
 purposes. Spread of fake news has become an alarming problem in modern world. At the time of critical situations, we often get puzzled and diverted from our main purpose 
 by the effect of fake news from social media. With the flow of time, people in modern world has become much dependend on social media for news and updates. People are 
 comfortable with small smartphones with social media to communicate and get updates rather getting news from immobile television. With change from the previous trend, the 
 rate of increase in fake news has also accelerated. With access in the media, everyone has the opportunity to spread news, true or false. Sometimes, the rumors or hoax that 
 they hear from anyone, they share it without cross-checking. People with simple minds believe their propaganda by the grace of their presentation. By believing, they react 
 recklessly, and the evil purpose that was intended, is accomplished. By the effect of sharing misinformation and false news, people are distracted. Then, this mob can be 
 easily used for personal or group agenda. Fake news on social media have numerous negative effects. If fake news is spread against a person or group of people, then their 
 social dignity is diminished, and their life and assets can be at risk. Moreover, communal riots and religion's clashes may get ignited due to continuous fake news spreading 
 in the social media. During wartime the government itself sometimes spread false news to build support in favour of it. Autocrats and fascist rulers use their propaganda 
 machine to remain in power, to shut people's mouth, and to keep them blind from the real situation. This results in breaking down of unity in the nation, rise of communal 
 disharmony and disbelieves in a country. It is essential to fight against this malpractice. First of all we should not believe anyone who shares a news in virtual world. We 
 must cross-check the news and authencity of the news. Moreover, the media and journalists in a country must play a vital role to stop spreading of fake news. They should do 
 journalism with professionalism and let people know the real situation. We must grow mass-awareness against this bad culture. Sharing any kind of unauthentic news should be 
 strictly discouraged. The government should also take steps against who spread fake news and if there is a fake news identified, government should immediately take steps to 
 withdraw it from the internet. Spreading of fake news is a heinous crime and it affects us all. It brings our unity, harmony, and determination as a nation at risk. People 
 from all over the world should stand against this malpractice for their own sake.

