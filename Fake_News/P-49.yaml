gemini:
 score: 6.0
 feedback: |
  Score Breakdown:
  1. Content & Relevance: 2.0 / 3.0
     Reason: The submission defines fake news and identifies general impacts such as communal riots and political manipulation. However, it lacks discussion of specific social media mechanisms like algorithms or echo chambers and fails to provide a specific, named real-world example as required for the highest tier.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The paragraph has a basic progression from definition to effects to solutions, but the flow is clunky. It lacks a strong PEE (Point-Evidence-Explanation) structure and transitions between ideas are repetitive or weak.
  3. Lexis & Academic Register: 1.5 / 2.5
     Reason: The vocabulary is standard but relies on common words. The tone is occasionally too subjective and emotional (e.g., "heinous crime," "evil purpose," "simple minds") rather than objective and academic.
  4. Grammar & Mechanics: 1.5 / 2.5
     Reason: There are several noticeable errors including the use of uncountable nouns as plural ("informations"), subject-verb agreement ("social media are"), and spelling ("dependend").
  
  Overall Score: 6.0 / 10
  
  Corrective Feedback:
  1. "Fake news on Social media are the false informations..."
      Issue: "Information" is an uncountable noun and "social media" is typically treated as a singular collective subject in this context.
      Correction: "Fake news on social media is the false information..."
  2. "...people in modern world has become much dependend on social media..."
      Issue: Subject-verb agreement (plural "people" needs "have") and spelling error.
      Correction: "...people in the modern world have become much more dependent on social media..."
  3. "...rather getting news from immobile television."
      Issue: Missing the comparative conjunction "than."
      Correction: "...rather than receiving news from stationary television sets."
  4. "...rise of communal disharmony and disbelieves in a country."
      Issue: Incorrect word form; "disbelieves" is a verb, but a noun is required here.
      Correction: "...rise of communal disharmony and disbelief within a nation."
  
  Improvement Feedback:
  1. "Fake news on social media have numerous negative effects."
      Target Area: Organization & Cohesion
      Suggestion: Use a more sophisticated transition to link the causes of fake news to its consequences. For example: "The rapid dissemination of such unverified content leads to a cascade of detrimental societal effects."
  2. "People with simple minds believe their propaganda..."
      Target Area: Lexis & Academic Register
      Suggestion: Replace subjective and judgmental language with objective academic terms. Example: "Susceptible audiences may be influenced by propaganda due to its persuasive delivery and the absence of critical media literacy."
  3. "With access in the media, everyone has the opportunity to spread news..."
      Target Area: Content & Relevance
      Suggestion: To reach the exceptional tier, incorporate technical terminology regarding social media mechanisms. Example: "The low barrier to entry on digital platforms, combined with engagement-driven algorithms, allows misinformation to achieve virality far faster than verified journalism."



