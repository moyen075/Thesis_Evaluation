paragraph: |
 Fake News on Social media

 Propaganda, fake news nowadays, spreading mostly through Social media, can cause huge negative impact on the society or the country as a whole. The Fake News are the news 
 that the generated intentionally to marginalize some community from the mainstream or to get political agenda done. This kind of news can cause violence, mistrust, disharmony 
 among many living communities in any country. At first, this kind of news was, used to be deliberately produced by the government or authority during war time or war like 
 situation. The main agenda to do that was to unite a whole nation against their so called enemies. But in modern times it is not limited only in war-like situations. As 
 there is a presence of social media, every person  in general has become news generators. And as everyone has that power, some of us tends to use this on various oray story. 
 The idea of producing false news pops up when there is a particular reason to do that which may be some political benefit or some social benefit. Suppose, in these days a 
 news on social meadia gets viral which goes against the muslim community by some different religious groups, the whole muslim community will get united and start butchering 
 every othen people from different religious groups. By doing so, a total anarchy will be in the country which can lead us to civil war if external parties get involved for 
 their interests. That's why this kinds of propaganda are self-destructive. This must be obliterated. The people who spreads the news usually want their community to trust on 
 them for their survival and they want to the community to make them their Leader. This kind of political practice can call upon the doomsday for a whole nation. To stop this 
 kind of news, we must be motre conscions about ourselves. We must think about all the people and communities living in harmony. Any kinds of trial for propaganda must be tried 
 to be obliterated by CROSS-checking the real news, on the ground multiple time. Thus, we can make our society- country more powerful/unitedly.

