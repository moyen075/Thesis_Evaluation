paragraph: |
 Fake news on Social Media

 Social media has turned itself a necessary evil to us and it's main reason may be-the increasing number of spreading fake news and propaganda. We have made ourselves too 
 much dependent on social media. It is very reasonable. As the technology advances we are advancing. The benefits we get from social media is literally uncountable. In every 
 sphere of our life, it is attached. We can get news, as quickly as possible through it. But the problem is that-are these news remain authentic & trustworthy or not. And now 
 a days this question is getting stronger and alarming for us. News that represents any situation throughout the world, now stands against a burning question whether it is 
 true or fake. By taking the advantages of our daily life dependency on media, some culprits, yellow journalists, paid morally degraded workers, fake social activists and so 
 on, they are spreading fake news just only for their own interest. This causes a total unrest throughout any-where of the world. It has a massive impact on any situation. 
 Normally, we can see in some big events like- Elections etc, are heavily impacted by fake news. It creates a total cauous. People believing these news, they start to act. 
 But when they realize, this is a fake news, they become upset and even they face loss in some cases. Fake news spread on social media creates political unrest. For that, it 
 hampers a nation's economy, education, health etc every sector. Due to the advancement of AI technology, now fake news can be created more easily and it seems actually just 
 like the real one. So, it has an adverse effect in every sector. To solve this problem we, all walks of people have to come forward. At first we have create public awareness 
 spread knowledge in people so that they don't believe anything without checking authenticity. Government should come forward in this case. Law enforcements and other 
 representative should enforce law and strict rules and regulations. Those who spread fake news should be punished according to the law strictly. Public sites and government 
 portal should be monitored by the corresponding authorities to prevent and spread fake news. By taking these steps, we will be able to reduce, the loss due to spreading fake 
 news and will also save ourselves from the poisonous claw of this henious crime.

