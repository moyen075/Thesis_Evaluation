 Fake News on Social Media

 The causes of fake news on social media are both natural and man-made. Nowadays due to high speed internet and easy access to smart phones social media like, Facebook, 
 tweeter, instagram, whatsapp have become an essential part of our life. Both formal and informal official and unofficial all kind of nears can be spread out using social 
 media.  As it is connected to mass both real and fake news spread rapidly in social media. We can send messages along with information through social media platform. As 
 it is an easy and accessible way of sending information people can send any news to any one he is connected with. So, there is no need or will of fact checking of a news 
 before sending it to another person. So, the main reason of fake news being sprede is lack of authority and easy access to internet. Another view of fake news on social 
 media is actually evil and man made. Some evil people or organization can spread fake news through their group of people willingly. This is done for personal interest. 
 These fake news spreads very fast through internet and before anyone coon implement fact checking the news makes unrest and chaos in the society. This is done for money 
 and power by bad people. Also to mat Fake news on social media are also used as a medium of propaganda by foreign powers who want to make regime change inside a country. 
 The consequences of fake news are very dangerous and when it gets the speed due to social media it can be make a devastating result. Though there are many reasons but easy 
 access, lack of authority, unwillingness of fact checking and man made co fake news spreading are at the top of the list. As fake news create really bad consequinces by 
 proper regulations social media platforms should be controled so that  fake news can not be speed rapidly.

