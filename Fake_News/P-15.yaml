paragraph: |
 Fake News on Social Media

 Fake news on Social media is one of the most alarming concerns today. This leads to social unrest, political anarchy and personal on industrial losses. As the young generation 
 is spending a lot of time in the social media, it is easy to mislead them with a false information where cross checking is rather difficult. Many can create the fake news for 
 their own profit completely ignoring the consequenses. Many industries can create fake news to destroy their rivals and gain more profit. Political parties also create fake 
 news to create chaos among other parties or the public. Many people blindly trust the men's they see in the social media and is harmed in many ways. This creates social unnest 
 and unnecessary movements. Fake sensitive news of an individual can completely destroy that person. However, certain problems can be avoided by spreading fake news. We Can see 
 the example of August 2024, when the police were inactive and some extreamists were damaging and lasting Hindu temples and houses. Then someone posted a fake news of responsible 
 youths protecting the temples and house.  The news went viral and thousands of people Come forward to protect the minority. But fake news ultimately causes great harm and it should 
 be controlled and reduced by any means necessary.
