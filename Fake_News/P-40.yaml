paragraph: |
 Fake News on Social Media

 Spreading fake news on social media is a crime which violates the harmony and peace of a country. In the era of modern civilization, newspaper is often ignored because of 
 the availability of news online. Reading news on social media is getting quite popular among the teenagers. In fact, people of all ages are getting used to these sort of 
 news. Of course, this saves a lot of time and money, however, every news on social media is not authentic. Some people spread fake news on their social media for various 
 reasons. Firstly, some illiterate people want to disturb the harmony among others, So they share fake news to panic them. Secondly, some people, mostly teenagers, spread
 fake news just for their fun. Thirdly, some may spread false news to scam others and do harm to them. In addition, political propaganda and rumours are very common nowadays. 
 In fact, some news are misinterpreted just to Indirect people in the wrong way. As a result, there are many consequences of it. Some people lose everything after falling a 
 victim to false news or scam. Also, the harmony and peace among the people and society are greatly disrupted. People begin to disbelieve others. It creates trust issures.
 National secuirity becomes vulnerable. Therefore, fake news do not just hampers personal life, they also put, the country at high risk in terms of secuirity and unity.

