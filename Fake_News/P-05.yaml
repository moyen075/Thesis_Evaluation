paragraph_id: "P-05"

paragraph: |
 Fake News on Social Media

 News carried by social media, plays a very vital role in human actions. Nowadays people are attracted very much to social media, as a result many fake news also appear in 
 front of their screen. But without proper reference, findings, many people believe those news, than creates a huge massacre in real life because no such events occurs in 
 practical life. There are hundreds of examples of the negative outcome of believing those news. A few days ago, there is a fake news gets viral, that is the honorable advisor 
 of Bangladesh Government, Dr Mohammad Yunus, fled along with the youth leaders from Bangladesh. But the news was completely wrong. But people from village, less educated 
 people, general people believed that news. Because of that, they felt very worried thinking of their future, of their children. They thought Bangladesh will face another 
 killing like in July, August 2024. But the press secretary confirmed that the news was fake and they are doing well. So, every news can't be believed. Only news from 
 verified source should be believed, so that there comes no confusion among us. In social media, everyone can share their opinion, their feelings. But not everything is 
 permitted in the real world. So, we must be careful when we see such news in front of our screen. In the social media, no one is judged, no one is punished for their action. 
 Some group finds benefit from that. They creates propaganda of their enemy, even though those are not true. When those false news comes in front of general people the believes 
 that. Because of that, in real life many problematic situation occurs. There should be a team or system who can verify the news before publishing in the social media. After 
 that filtration, some confusion will be decreased. So, fake news are very dangerous thing both in social and real media. Mass awareness must be taken to get rid of the problem.

