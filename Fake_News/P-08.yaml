 feedback: |
  Score Breakdown:
  1. Content & Relevance: 2.0 / 3.0
     Reason: The student addresses the prompt and identifies the speed of social media spread. However, the analysis is slightly generic, missing specific technical mechanisms (algorithms, echo chambers) and a named real-world example required for the highest tier.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The paragraph follows a basic chronological structure (history to present issues), but the flow is clunky with repetitive phrasing and a topic sentence that relies on metaphor rather than an academic claim.
  3. Lexis & Academic Register: 1.5 / 2.5
     Reason: The vocabulary is appropriate for general communication but lacks field-specific terminology like "disinformation" or "algorithmic bias." The tone is also somewhat emotional/subjective ("cancer", "kill the society").
  4. Grammar & Mechanics: 0.5 / 2.5
     Reason: There are pervasive errors in spelling, pluralization, subject-verb agreement, and word choice throughout the paragraph that impede the professional quality of the writing.
  
  Overall Score: 5.0 / 10
  
  Corrective Feedback:
  1. "Information tranformation"
      Issue: Spelling error.
      Correction: Information transformation.
  2. "unite human all over the globe an a single platform"
      Issue: Errors in pluralization (human) and preposition/article usage (an).
      Correction: unite humans all over the globe on a single platform.
  3. "Most significance was the speard of false news"
      Issue: Incorrect word form and spelling.
      Correction: Of most significance was the spread of false news.
  4. "creates so much choose among public"
      Issue: Incorrect word choice (likely intended "chaos").
      Correction: creates so much chaos among the public.
  
  Improvement Feedback:
  1. "Fake news on social media is like a cancer of our society"
      Target Area: Lexis & Academic Register
      Suggestion: Replace emotional similes with objective, technical definitions to suit a Social Science topic. Better alternative: "The proliferation of disinformation on social media platforms poses a systemic threat to social cohesion."
  2. "As news in social media transmit faster than real life"
      Target Area: Content & Relevance
      Suggestion: To reach the exceptional tier, mention the specific social media mechanisms that drive virality. Better alternative: "Driven by engagement-based algorithms, disinformation often achieves virality more rapidly than verified reporting."



