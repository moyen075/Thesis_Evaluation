paragraph: |
 Fake News on Social Media

 Fake news on social media is like a cancer of our society which will kill the society slowly but surely by dividing people and spreading allegations about each other. 
 Social media was first introduced as a blessing for mankind , It was desired to unite human all over the globe an a single platform. Information tranformation was easy. 
 Any news can circulate all over the world in a very short span of time. But every thing has its negative side. Soon the negative side of social media started to publish. 
 Most significance was the speard of false news. As news in social media transmit faster than real life, fake news started circulating  faster than ever. Some people started
 to use this for their personal benefit. Any rival business company can propagate a false news against a big of famous company, making people unhappy about it. Any enemy of 
 us can spread any bad rumour, and it is enough to destroy your social image. Some people started harrasing and blackmailing by others by  bad news. They want money or else
 they will publish it to ruin your popularity. Some people take this to next level. They create a false image of or video clip or any audio clip using AI and spread it in 
 social media to ruin any  public figure's career . Sometimes there are fake news about religion disrespect and creates so much choose among public. These type of bad people
 were in past also. But now they use social media to spread this news faster and creating much more damage. However, social media is a blessing for connecting people. But 
 using it to spread false news and information creates social chaos, mass disrespect and serious social havoc.

