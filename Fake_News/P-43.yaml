paragraph: |
 Fake news on Social Media

 Fake news on social media is a common but serious issue which misleads young and old generation of people in every country and it may be driven by personal or pollitical 
 agenda. Fake news on social media means posting something that may not be entirely true for one's personal gains although it may be accidental. Nowadays, almost every people 
 in the world are connected to social media as it has become a necessity to stay connected to the real world. People use several social media platforms like Facebook, Twitter, 
 Instagram etc. Some people use them for news and some people use them for entertainment. People use social media by watching posts, stories and videoes others have posted. 
 And sometimes what ones eyes see may not be entirely true. There may be several made up and fake news on social media platforms. while a few of them may be accidental, most 
 of the fake news are made deliberately. People post these fake news mainly for two reasons: for personal gain or for pollitical gain. Personal gain is usually achieved by 
 money. There can be cases Where people pay other people to create fake news. If some people publish fake news, it may get many views and it helps them earn money from the 
 platform. For example :- A scary video gains many views if made realistically however chances of being that video real is close to zero. On other hand, there may be some 
 huge discount going on a product which is not even possible some people do so because it gains them followers. It boosts their publicity. Another agenda is pollitical agenda. 
 Some pollitical party pays some people to deliberately post fake news to mislead opposition party. This misleading news can cause the opposition party to Iose supporters or 
 votes. There are also reporting and news agencies who deliberately publish fake news. This is usually driven by government or higherups who want to mislead common people. 
 This is even more done when a crisis is going or during ellections. The effect of fake news on social media are many. One of them is mass panic. During crisis, if mass panic 
 can be created, the strength of the country degrades, by several times. This is why during flood or other natural calamities, our neighbouring country news media creates fake 
 news to scare our people. Another effect of this problem is turmoil among people. People may not believe the true source of news after seeing the fake news on social media. 
 It may lead to quarrell and fighting among people. There are children and youngsters who are the worst people effected. They are easy to mislead. They often drift away and 
 fall into addiction after seeing fake news on social media. Another driving force nowadays is AI. There are many AI created contents that are fake and people can not even 
 tell the difference between them. These types of practices are harmful and should be banned immidiately for the betterment of the society.

