  Score Breakdown:
  1. Content & Relevance: 1.0 / 3.0
     Reason: The submission remains at a surface level, treating fake news as general rumors rather than explaining social media-specific mechanisms like algorithms or virality. Crucially, it fails to provide a specific real-world example as required by the rubric.
  2. Organization & Cohesion: 1.0 / 2.0
     Reason: The paragraph has a functional beginning and end, but the transition to legal punishments is abrupt, and the logical flow feels clunky rather than seamless.
  3. Lexis & Academic Register: 1.5 / 2.5
     Reason: While the vocabulary is understandable, the student relies on emotional and subjective language (e.g., "horribly," "morally disturbed," "menace") and fails to use technical terms like "disinformation" or "echo chambers."
  4. Grammar & Mechanics: 0.5 / 2.5
     Reason: The text contains pervasive errors in syntax, verb forms, and subject-verb agreement (e.g., "to sent," "it needed pay," "do thin") that significantly impede the academic quality.
  
  Overall Score: 4.0 / 10
  
  Corrective Feedback:
  1. "Fake News on Social Media caused by some morally disturbed individuals affect horribly"
      Issue: Subject-verb agreement error and awkward adverb placement.
      Correction: Fake news on social media, often spread by individuals, affects our daily lives significantly.
  2. "do thin heinous act"
      Issue: Typo/Grammar slip.
      Correction: commit this heinous act.
  3. "laws should be passed from the parliament to sent that fugitive to jail and it needed pay monetary fines."
      Issue: Incorrect verb tense ("sent") and fragmented/unclear syntax.
      Correction: laws should be passed by parliament to send these individuals to jail and require them to pay monetary fines.
  
  Improvement Feedback:
  1. "Fake news and rumors are very easy to spread as people can not check the authenticity of it."
      Target Area: Content & Relevance
      Suggestion: Incorporate specific social media mechanisms to meet the "Exceptional" criteria. Suggestion: "The virality of fake news is often accelerated by social media algorithms that prioritize engagement over accuracy."
  2. "The worst thing happens when other people believe those news..."
      Target Area: Lexis & Academic Register
      Suggestion: Replace subjective and informal phrasing with academic terminology. Suggestion: "The proliferation of disinformation within digital echo chambers significantly distorts public perception and objective judgment."



