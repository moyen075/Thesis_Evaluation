paragraph: |
 Fake News on Social Media

 Fake news on social media caused by some morally disturbed individuals affect horribly in our day to day life. Social media is now-a-days available to everyone. Fake news 
 and rumors are very easy to spread as people can not check the authenticity of it. Usually people who spread fake news, do thin heinous act in order to socially make someone 
 embarrassed, for personal vengeance, political rivalry etc. Most of the people in our country do not have  the patience to cross refer the news. moreover, they start going 
 with flow and end up contributing spreading the news. This is a huge accomplishment for that individual who is behind the fake news or rumour. The worst thing happens when 
 other people believe those news and let that rumour affect their thinking, judgment and attitude towards that particular incident. This mentality damages relationships, 
 destroys faith in certain object, company or people. When the fake news spreads through social media, it becomes hard to contain the flow as it moves really fast. This is an 
 act of severe moral degradation and these laws should be passed from the parliament to sent that fugitive to jail and it needed pay monetary fines. In conclusion, social media 
 is a really good place to start a pandemic of rumours and those who do this and destroys the peace of the common people are a menace to the society.

