paragraph_id: "P-01"

paragraph: |
 Fake News on Social Media

 We are living in an age of social media and social media highly influences our daily life. But fake news on those medias 
 haves become a great concern for us. Fake news on social media has become a social and national security issue and keeping 
 this matter unsolved can threaten our personal, social and national life. Fake news is spread on social media mainly driven 
 by evil intention, to create chaos and anarchy. Lack of strict rules and regulations facilitate this spread. Sometimes, even 
 popular news agencies spread news on social media without proper crosschecking and verification and most of the time those 
 news turn out to be false. Sometimes they do so only to gain viewership. These false news are harmful to our social stability. 
 In Our country, it is a common scenario to attack a particular religion or tribe based on these fake social media news. These 
 types of incidents creates a bad impression about our country to the international sector. Fake news also plays with public 
 trust and if this types of news is spread too much, people even tend to disbelieve true news. This issue has prevailed in our 
 country for quite a long time and now it is high time we took stern actions against it. The people associated with spreading 
 false news must be given exemplary punishment. The social media rules made be strict and proper monitoring system should be 
 ensured from national level. The individuals should verify before sharing false news in social media and report if the news 
 is false. To conclude, if the individuals are cautious, the related authority is strict and the government is willing, we can 
 stop the spread of false news in earliest possible time.

